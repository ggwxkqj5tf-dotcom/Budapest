<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Budapest · Mai 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#f5f2ed;--surface:#fff;--s2:#f0ece5;--s3:#e8e2d9;
  --border:#ddd6cc;--border2:#c8bfb4;
  --text:#1a1410;--t2:#5a4e44;--t3:#9a8c80;--t4:#bfb3a8;
  --red:#c0392b;--red-s:#fdecea;
  --green:#1e7a46;--green-s:#e6f4ec;
  --blue:#1a5fb4;--blue-s:#e8f0fd;
  --amber:#c07020;--amber-s:#fff3e0;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-sm:0 1px 3px rgba(0,0,0,.1);
  --d1:#d4541a;--d2:#1e7a46;--d3:#1a5fb4;--d4:#7b3fa0;--d5:#b07818;
  --hh:54px;--nh:60px;--r:12px;--r-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* HEADER */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:600;height:var(--hh);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;box-shadow:var(--shadow-sm);
}
.hdr-logo{width:32px;height:32px;border-radius:8px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr-name{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;line-height:1.1}
.hdr-sub{font-size:.65rem;color:var(--t3)}
.hdr-right{display:flex;gap:6px;margin-left:auto;align-items:center}
.hdr-chip{background:var(--s2);border:1px solid var(--border);color:var(--t2);padding:4px 9px;border-radius:20px;font-size:.65rem;font-weight:600;white-space:nowrap}
@media(max-width:500px){.hdr-chip{display:none}}
.icon-btn{width:36px;height:36px;border:none;cursor:pointer;border-radius:var(--r-sm);background:var(--s2);color:var(--t2);font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s}
.icon-btn:hover{background:var(--s3)}
.btn-save{height:34px;padding:0 13px;border:none;cursor:pointer;border-radius:var(--r-sm);background:var(--red);color:#fff;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:700;white-space:nowrap;transition:.15s}
.btn-save:hover{opacity:.88}

/* LAYOUT */
#app{position:fixed;top:var(--hh);left:0;right:0;bottom:0;display:flex}
#sidebar{width:360px;min-width:280px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#map-wrap{flex:1;position:relative;min-width:0}
#map{width:100%;height:100%;background:#e8e4dc}

/* MAP CONTROLS */
#map-right{position:absolute;top:10px;right:10px;z-index:400;display:flex;flex-direction:column;gap:5px}
@media(max-width:500px){#map-right{top:8px;right:8px}}
.mctrl{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t2);box-shadow:var(--shadow-sm);transition:.2s;text-align:center;min-width:64px}
.mctrl:hover{background:var(--s2)}
.mctrl.on{background:var(--red);color:#fff;border-color:var(--red)}
.day-mctrl.on{color:#fff;border-color:transparent}

/* Metro box */
#metro-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;box-shadow:var(--shadow);min-width:170px}
.metro-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:7px}
.metro-row{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:.75rem;color:var(--t2);cursor:pointer}
.metro-row input{accent-color:var(--red);width:14px;height:14px;cursor:pointer}
.mbadge{width:22px;height:22px;border-radius:5px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;flex-shrink:0}
.metro-hide-btn{margin-top:8px;padding-top:7px;border-top:1px solid var(--border);width:100%;background:var(--s2);border:none;border-radius:6px;padding:5px 0;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t2);cursor:pointer}
.metro-hide-btn:hover{background:var(--s3)}

/* Legend */
#legend{position:absolute;bottom:10px;left:10px;z-index:400;background:rgba(255,255,255,.95);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;box-shadow:var(--shadow-sm);font-size:.68rem}
.leg-title{font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;font-size:.62rem}
.leg-row{display:flex;align-items:center;gap:6px;color:var(--t2);margin:2px 0}
.leg-line{width:18px;height:3px;border-radius:2px}
@media(max-width:700px){#legend{display:none}}

/* POPUP */
.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:var(--r)!important;box-shadow:0 4px 24px rgba(0,0,0,.13)!important;color:var(--text)!important}
.leaflet-popup-tip{background:var(--surface)!important}
.leaflet-popup-content{margin:13px 15px!important;font-family:'DM Sans',sans-serif!important;color:var(--text)!important;min-width:180px}
.pu-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:2px}
.pu-cat{font-size:.72rem;color:var(--t3);margin-bottom:7px}
.pu-row{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--t2);margin:2px 0}
.pu-hours{background:var(--green-s);border-left:3px solid var(--green);padding:5px 8px;border-radius:0 6px 6px 0;font-size:.72rem;color:var(--green);margin-top:6px;font-weight:600}
.pu-tag{display:inline-block;margin-top:7px;padding:3px 10px;border-radius:6px;font-size:.68rem;font-weight:700;color:#fff}
.pu-route{margin-top:8px;padding:6px 8px;border-radius:7px;background:var(--s2);border:1px solid var(--border)}
.pu-route-title{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);margin-bottom:3px}
.pu-route-val{font-size:.78rem;font-weight:600;color:var(--text)}

/* TABS */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.tab-btn{flex:1;background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;padding:11px 4px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab-btn .ti{font-size:.95rem}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}

/* PANEL */
.panel{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pane{display:none}
.pane.active{display:block}

/* Day block */
.day-block{border-bottom:2px solid var(--s2)}
.day-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--surface);transition:.15s;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.day-head:hover{background:var(--s2)}
.day-stripe{width:4px;height:36px;border-radius:3px;flex-shrink:0}
.day-info{flex:1}
.day-label{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:700}
.day-date{font-size:.68rem;color:var(--t3);margin-top:1px}
.day-meta{display:flex;gap:5px;align-items:center}
.day-count{background:var(--s2);border:1px solid var(--border);color:var(--t2);padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:700}
.day-dist{font-size:.65rem;color:var(--t3);padding:2px 6px;background:var(--s2);border-radius:10px;border:1px solid var(--border)}
.chev{color:var(--t4);transition:.25s;font-size:.75rem}
.day-block.closed .chev{transform:rotate(-90deg)}
.day-body{background:var(--bg)}
.day-block.closed .day-body{display:none}

/* Location card */
.loc-card{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--border);background:var(--surface)}
.loc-card:hover{background:#faf7f4}
.loc-card.active{background:var(--red-s)}
.loc-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;margin-top:1px}
.loc-body{flex:1;min-width:0}
.loc-name{font-weight:600;font-size:.87rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.loc-cat{font-size:.68rem;color:var(--t3);margin-top:1px}
.loc-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:600}
.chip-price{background:var(--green-s);color:var(--green)}
.chip-time{background:var(--s2);color:var(--t2)}
.chip-star{background:var(--amber-s);color:var(--amber)}
.chip-hours{background:#f0e8ff;color:#6a24b4}
.chip-bus{background:var(--blue-s);color:var(--blue);font-weight:700}
.loc-actions{display:flex;gap:3px;opacity:0;transition:.2s;flex-shrink:0}
.loc-card:hover .loc-actions,.loc-card:active .loc-actions{opacity:1}
.ic{width:28px;height:28px;border:none;cursor:pointer;border-radius:6px;background:none;color:var(--t3);font-size:.82rem;display:flex;align-items:center;justify-content:center;transition:.15s}
.ic:hover{background:var(--s2);color:var(--text)}
.ic.del:hover{background:var(--red-s);color:var(--red)}

/* SEGMENT ROWS */
.route-seg{
  display:flex;align-items:center;gap:8px;
  padding:6px 14px 6px 50px;background:var(--bg);
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:.15s;user-select:none;
}
.route-seg:hover{background:var(--s3)}
.route-seg.expanded{background:var(--s2)}
.seg-icon{font-size:.8rem;flex-shrink:0}
.seg-main{flex:1}
.seg-info{font-size:.7rem;color:var(--t2);font-weight:600}
.seg-dist{font-size:.68rem;color:var(--t3)}
.seg-hint{font-size:.6rem;color:var(--t4);margin-top:1px}
.seg-expand-btn{font-size:.65rem;color:var(--t3);padding:2px 6px;background:var(--surface);border:1px solid var(--border);border-radius:10px;white-space:nowrap;flex-shrink:0}

/* Segment detail panel */
.seg-detail{
  display:none;background:var(--s2);border-bottom:1px solid var(--border);
  padding:8px 14px 10px 50px;
}
.seg-detail.open{display:block}
.seg-opt{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 10px;border-radius:8px;background:var(--surface);
  border:1px solid var(--border);margin-bottom:6px;
}
.seg-opt:last-child{margin-bottom:0}
.seg-opt-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
.seg-opt-body{flex:1}
.seg-opt-title{font-size:.72rem;font-weight:700;color:var(--text)}
.seg-opt-desc{font-size:.68rem;color:var(--t2);margin-top:2px;line-height:1.4}
.seg-opt-badge{display:inline-block;margin-top:4px;padding:2px 8px;border-radius:8px;font-size:.64rem;font-weight:700}

/* Airport special card */
.airport-card{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,#f8f5f0,var(--surface));cursor:pointer;
}
.airport-card:hover{background:var(--s2)}
.airport-icon{width:26px;height:26px;border-radius:6px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.airport-body{flex:1}
.airport-name{font-weight:600;font-size:.85rem}
.airport-sub{font-size:.68rem;color:var(--t3);margin-top:2px}
.transfer-info{background:var(--blue-s);border:1px solid var(--blue);border-radius:7px;padding:6px 9px;margin-top:7px;font-size:.7rem;color:var(--blue);font-weight:500;line-height:1.5}

/* Hotel check-in block */
.hotel-checkin{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;border-bottom:1px solid var(--border);
  background:var(--amber-s);
}
.hotel-checkin-icon{font-size:1rem}
.hotel-checkin-text{font-size:.75rem;font-weight:600;color:var(--amber)}
.hotel-checkin-sub{font-size:.65rem;color:var(--t2);margin-top:1px}

/* Add panel */
.add-wrap{padding:14px}
.add-wrap h3{font-family:'Playfair Display',serif;font-size:.95rem;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
.fg label{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)}
.fg input,.fg select,.fg textarea{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:8px 10px;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:.83rem;outline:none;width:100%;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--red)}
.fg textarea{resize:vertical;min-height:50px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tip-box{background:var(--amber-s);border-left:3px solid var(--amber);padding:7px 10px;border-radius:0 6px 6px 0;font-size:.72rem;color:var(--t2);margin-bottom:10px}
.btn-row{display:flex;gap:7px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:9px 16px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:700;transition:.15s}
.btn-r{background:var(--red);color:#fff}
.btn-r:hover{opacity:.88}
.btn-g{background:var(--s2);color:var(--t2);border:1px solid var(--border)}
.btn-g:hover{background:var(--s3)}
.manage-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.79rem}
.manage-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Overview */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px}
.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px;text-align:center}
.stat-n{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--red);font-weight:700}
.stat-l{font-size:.65rem;color:var(--t3);margin-top:1px}
.ov-sep{height:1px;background:var(--border);margin:0 14px 6px}
.ov-day{padding:5px 14px}
.ov-day-lbl{font-family:'Playfair Display',serif;font-size:.82rem;font-weight:700;margin-bottom:3px}
.ov-loc{display:flex;align-items:center;gap:6px;padding:3px 4px;border-radius:6px;cursor:pointer;transition:.15s;font-size:.78rem}
.ov-loc:hover{background:var(--s2)}
.ov-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ov-price{margin-left:auto;font-size:.67rem;color:var(--green);white-space:nowrap}

/* MOBILE NAV */
#mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:700;height:var(--nh);background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.mn-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:'DM Sans',sans-serif;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);padding:8px 0;min-height:44px;transition:.2s}
.mn-btn .mi{font-size:1.1rem}
.mn-btn.active{color:var(--red)}

/* DRAWER */
#drawer{display:flex;flex-direction:column;position:fixed;bottom:var(--nh);left:0;right:0;z-index:650;background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);max-height:calc(100svh - var(--hh) - var(--nh) - 10px);box-shadow:0 -4px 24px rgba(0,0,0,.1)}
#drawer.open{transform:translateY(0)}
#drawer-handle{display:flex;justify-content:center;padding:10px 0 6px;cursor:pointer;flex-shrink:0}
.handle-bar{width:34px;height:4px;border-radius:3px;background:var(--border)}
.dtab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.dtab-btn{flex:1;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:9px 4px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;transition:.2s}
.dtab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.drawer-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dpane{display:none}
.dpane.active{display:block}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.4);align-items:center;justify-content:center;padding:16px}
#modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:20px;width:100%;max-width:420px;box-shadow:0 16px 48px rgba(0,0,0,.18)}
.modal h3{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:8px}
.modal textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-family:monospace;font-size:.75rem;height:140px;resize:none;outline:none}
.modal-foot{display:flex;gap:7px;justify-content:flex-end;margin-top:10px}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:#fff;padding:8px 18px;border-radius:30px;font-size:.78rem;font-weight:600;z-index:9999;transition:transform .28s ease;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

/* RESPONSIVE */
@media(max-width:700px){
  #sidebar{display:none}
  #mob-nav{display:flex}
  #app{bottom:var(--nh)}
}
@media(min-width:701px){
  #mob-nav{display:none!important}
  #drawer{display:none!important}
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header id="hdr">
  <div class="hdr-logo">🏰</div>
  <div>
    <div class="hdr-name">Budapest 2026</div>
    <div class="hdr-sub">Persönlicher Reiseplaner</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-chip">✈ 18.05 · 12:00</div>
    <div class="hdr-chip">✈ 22.05 · 20:30</div>
    <button class="icon-btn" onclick="openModal()" title="Import">📂</button>
    <button class="btn-save" onclick="exportJSON()">💾 Speichern</button>
  </div>
</header>

<div id="app">
  <aside id="sidebar">
    <div class="tab-bar" id="desk-tabbar">
      <button class="tab-btn active" onclick="deskTab('plan',this)"><span class="ti">📅</span>Tagesplan</button>
      <button class="tab-btn" onclick="deskTab('ov',this)"><span class="ti">📊</span>Übersicht</button>
      <button class="tab-btn" onclick="deskTab('add',this)"><span class="ti">➕</span>Hinzufügen</button>
    </div>
    <div class="panel" id="desk-panel">
      <div class="pane active" id="dp-plan"></div>
      <div class="pane" id="dp-ov"></div>
      <div class="pane" id="dp-add"></div>
    </div>
  </aside>

  <div id="map-wrap">
    <div id="map"></div>

    <div id="map-right">
      <button class="mctrl on" id="fb-all" onclick="filterDay('all',this)">Alle</button>
      <button class="mctrl day-mctrl" id="fb-1" onclick="filterDay(1,this)">Tag 1</button>
      <button class="mctrl day-mctrl" id="fb-2" onclick="filterDay(2,this)">Tag 2</button>
      <button class="mctrl day-mctrl" id="fb-3" onclick="filterDay(3,this)">Tag 3</button>
      <button class="mctrl day-mctrl" id="fb-4" onclick="filterDay(4,this)">Tag 4</button>
      <button class="mctrl day-mctrl" id="fb-5" onclick="filterDay(5,this)">Tag 5</button>
      <button class="mctrl" id="metro-toggle-btn" onclick="toggleMetro()" style="margin-top:4px">🚇 U-Bahn</button>
      <div id="metro-box" style="display:none">

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function dayColor(d){return['','#d4541a','#1e7a46','#1a5fb4','#7b3fa0','#b07818'][d]||'#888'}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, r=Math.PI/180;
  const dLat=(lat2-lat1)*r, dLng=(lng2-lng1)*r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

/* FIX: Realistic tourist walking
   4 km/h pace (leisure, looking around) × 1.35 street factor
   → 5 km straight = 6.75 km real = ~101 min ≈ displayed as ~1h 40 Min */
function calcWalking(lat1,lng1,lat2,lng2){
  const straight=haversine(lat1,lng1,lat2,lng2);
  const dist=straight*1.35;          // street detour factor
  const speed=4000/3600;             // 4 km/h tourist pace in m/s
  return {dist, dur:dist/speed};
}

function fmtDist(m){return m<1000?`${Math.round(m)} m`:`${(m/1000).toFixed(1)} km`}

function gmapsNavUrl(lat,lng,name){
  return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`;
}
function gmapsViewUrl(lat,lng){

}
function fmtTime(s){
  const m=Math.round(s/60);
  if(m<1)return'<1 Min';
  return m<60?`${m} Min`:`${Math.floor(m/60)}h ${m%60?` ${m%60} Min`:''}`;
}

/* ═══════════════════════════════════════
   SAFE DOM ID HELPER
   -> and special chars are invalid in CSS selectors used with querySelector
   Convert "hotel->2" to "hotel_to_2"
═══════════════════════════════════════ */
function safeSeg(key){ return key.replace(/->/g,'_to_').replace(/[^a-zA-Z0-9_\-]/g,'_'); }

/* ═══════════════════════════════════════
   METRO ROUTE SUGGESTION
═══════════════════════════════════════ */
function findNearestStation(lat,lng){
  let best=null, bestDist=Infinity;
  for(const [key,data] of Object.entries(METRO)){
    for(const s of data.stations){
      const d=haversine(lat,lng,s.lat,s.lng);
      if(d<bestDist){bestDist=d;best={...s,line:key,lineColor:data.color,lineName:data.name,dist:d}}
    }
  }
  return best;
}

/* Find metro route between two stations; returns description string */
function findMetroRoute(stA, stB){
  if(stA.line===stB.line){
    // same line – direct
    return {
      text:`${stA.lineName}: ${stA.n} → ${stB.n}`,
      color:stA.lineColor,
      line:stA.line,
      direct:true
    };
  }
  // Check if transfer at Deák works
  const DEAK_LINES=['m1','m2','m3'];
  if(DEAK_LINES.includes(stA.line)&&DEAK_LINES.includes(stB.line)){
    const mA=METRO[stA.line], mB=METRO[stB.line];
    return {
      text:`${mA.name}: ${stA.n} → Deák Ferenc tér · Umstieg · ${mB.name}: Deák → ${stB.n}`,
      color:stA.lineColor,
      line:'transfer',
      direct:false
    };
  }
  return null;
}

function buildMetroSuggestion(fromLat,fromLng,toLat,toLng){
  const WALK_THRESHOLD=1000; // only suggest metro if both ends are within 1km of a station
  const stA=findNearestStation(fromLat,fromLng);
  const stB=findNearestStation(toLat,toLng);
  if(!stA||!stB) return null;
  if(stA.dist>WALK_THRESHOLD||stB.dist>WALK_THRESHOLD) return null;

  const route=findMetroRoute(stA,stB);
  if(!route) return null;

  const walkToA=calcWalking(fromLat,fromLng,stA.lat,stA.lng);
  const walkFromB=calcWalking(stB.lat,stB.lng,toLat,toLng);
  // Metro speed ~30 km/h, estimate metro distance
  const metroDist=haversine(stA.lat,stA.lng,stB.lat,stB.lng)*1.1;
  const metroTime=metroDist/(30000/3600);

  const totalMin=Math.round((walkToA.dur+metroTime+walkFromB.dur)/60);

  return {
    route,
    stA, stB,
    walkToASec:walkToA.dur,
    walkFromBSec:walkFromB.dur,
    metroSec:metroTime,
    totalMin
  };
}

    .bindPopup(`<div class="pu-name">🏨 ${HOTEL.name}</div><div class="pu-cat">Izabella u. 61, 1064 Budapest</div><div class="pu-row" style="margin-top:6px;font-size:.72rem;background:var(--s2);padding:5px 7px;border-radius:6px;"><b>Ausgangspunkt</b> aller Tagesrouten</div><div style="margin-top:8px"><a href="${gmapsNavUrl(HOTEL.lat,HOTEL.lng,'Hotel Budapest')}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:4px;background:#4285f4;color:#fff;padding:6px 10px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:700;text-decoration:none;">🧭 Navigation zum Hotel</a></div>`);

  // Map click → pick coords for add form
  map.on('click',e=>{
    ['add-lat','add-lat-m'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=e.latlng.lat.toFixed(6)});
    ['add-lng','add-lng-m'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=e.latlng.lng.toFixed(6)});
    showToast(`📍 ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`);
  });

  renderMap();
}

/* ═══════════════════════════════════════
   RENDER MAP
═══════════════════════════════════════ */
function renderMap(){
  if(!map||typeof L==='undefined') return;

  // Clear existing
  locations.forEach(l=>{l._marker=null});
  [...routeLayers,...markerLayers,...labelLayers].forEach(l=>{try{map.removeLayer(l)}catch(e){}});
  routeLayers=[];markerLayers=[];labelLayers=[];

  const filtered=currentFilter==='all'?locations:locations.filter(l=>l.day===currentFilter);

  // Group by day, exclude airports from routing
  const dayGroups={};
  filtered.forEach(loc=>{
    if(loc.type==='Flughafen') return;
    if(!dayGroups[loc.day]) dayGroups[loc.day]=[];
    dayGroups[loc.day].push(loc);
  });

  // Draw routes (all synchronous now – no network calls)
  for(const [day,locs] of Object.entries(dayGroups)){
    const c=dayColor(parseInt(day));
    const chain=[{lat:HOTEL.lat,lng:HOTEL.lng,id:'hotel'},...locs];

    for(let i=0;i<chain.length-1;i++){
      const from=chain[i], to=chain[i+1];
      // Straight dashed line – honest, no fake routing
      const poly=L.polyline([[from.lat,from.lng],[to.lat,to.lng]],{
        color:c,weight:3.5,opacity:.6,dashArray:'8,5',lineJoin:'round'
      }).addTo(map);
      routeLayers.push(poly);

      // Walk label
      const wk=calcWalking(from.lat,from.lng,to.lat,to.lng);
      const mid=[(from.lat+to.lat)/2,(from.lng+to.lng)/2];
      const lbl=L.divIcon({
        className:'',
        html:`<div style="background:${c};color:#fff;padding:2px 8px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.6rem;font-weight:700;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.22);">🚶 ${fmtDist(wk.dist)} · ${fmtTime(wk.dur)}</div>`,
        iconAnchor:[44,10]
      });
      const lm=L.marker(mid,{icon:lbl,interactive:false}).addTo(map);
      labelLayers.push(lm);
    }
  }

  // Draw markers
  const dayIdx={};
  filtered.forEach(loc=>{
    const c=dayColor(loc.day);
    if(!dayIdx[loc.day]) dayIdx[loc.day]=0;

    let iconHtml;
    if(loc.type==='Flughafen'){
      iconHtml=`<div style="background:#fff;border:2px solid #888;border-radius:8px;padding:3px 10px;font-family:'DM Sans',sans-serif;font-size:.63rem;font-weight:700;color:#555;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.12);">✈ Flughafen</div>`;
    } else {
      dayIdx[loc.day]++;
      const n=dayIdx[loc.day];
      iconHtml=`<div style="width:30px;height:30px;border-radius:50%;background:${c};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.25);font-family:'DM Sans',sans-serif;">${n}</div>`;
    }

    const marker=L.marker([loc.lat,loc.lng],{
      icon:L.divIcon({className:'',html:iconHtml,iconSize:[30,30],iconAnchor:[15,15]}),
      zIndexOffset:loc.type==='Flughafen'?0:100
    }).addTo(map);

    // Popup
    const hoursHtml=loc.hours?`<div class="pu-hours">🕐 ${loc.hours}</div>`:'';
    const priceHtml=loc.price&&loc.price!=='–'?`<div class="pu-row">💶 ${loc.price}</div>`:'';
    const timeHtml=loc.time?`<div class="pu-row">📍 Ab ${loc.time}${loc.duration?' · '+loc.duration:''}</div>`:'';
    const starHtml=loc.rating?`<div class="pu-row">⭐ ${loc.rating}/5</div>`:'';
    const busHtml=loc.busInfo?`<div class="pu-route"><div class="pu-route-title">Verbindung</div><div class="pu-route-val">${loc.busInfo}</div></div>`:'';
    const notesHtml=loc.notes?`<div style="margin-top:6px;font-size:.72rem;color:var(--t3);font-style:italic;">${loc.notes}</div>`:'';
    const dayObj=DAYS[loc.day-1];

    marker.bindPopup(`
      <div class="pu-name">${loc.name}</div>
      <div class="pu-cat">${loc.type}</div>
      ${priceHtml}${timeHtml}${starHtml}
      ${hoursHtml}
      ${busHtml}${notesHtml}
      <div class="pu-tag" style="background:${c}">${dayObj.label} · ${dayObj.date}</div>
      <div style="margin-top:8px;display:flex;gap:5px">
        <a href="${gmapsNavUrl(loc.lat,loc.lng,loc.name)}" target="_blank"
          style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;background:#4285f4;color:#fff;padding:6px 8px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:700;text-decoration:none;">
          🧭 Navigation
        </a>
        <a href="${gmapsViewUrl(loc.lat,loc.lng)}" target="_blank"
          style="display:flex;align-items:center;justify-content:center;gap:4px;background:#f0ece5;color:#5a4e44;padding:6px 8px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:700;text-decoration:none;border:1px solid #ddd6cc;">
          📍 Maps
        </a>
      </div>
    `,{maxWidth:280});

    marker.on('click',()=>highlightCard(loc.id));
    markerLayers.push(marker);
    loc._marker=marker;
  });
}

/* ═══════════════════════════════════════
   METRO
═══════════════════════════════════════ */
function buildMetroLayers(){
  for(const [key,data] of Object.entries(METRO)){
    if(metroLines[key]) continue;
    metroLines[key]=L.polyline(data.stations.map(s=>[s.lat,s.lng]),{
      color:data.color,weight:4,opacity:.8
    });
    // FIX: Clear old dots array first
    metroDots[key]=[];
    data.stations.forEach(s=>{
      const icon=L.divIcon({
        className:'',
        html:`<div style="width:10px;height:10px;border-radius:50%;background:${data.color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
        iconSize:[10,10],iconAnchor:[5,5]
      });
      const m=L.marker([s.lat,s.lng],{icon,interactive:true})
        .bindTooltip(`<b style="font-size:.75rem">${s.n}</b><br><span style="font-size:.68rem;color:#888">${data.name}</span>`,{direction:'top',offset:[0,-6]});
      metroDots[key].push(m);
    });
  }
  applyMetroVisibility();
}

function applyMetroVisibility(){
  for(const key of Object.keys(METRO)){
    const on=metroOn&&metroState[key];
    if(on){
      metroLines[key]&&metroLines[key].addTo(map);
      metroDots[key].forEach(m=>m.addTo(map));
    } else {
      metroLines[key]&&map.removeLayer(metroLines[key]);
      metroDots[key].forEach(m=>{try{map.removeLayer(m)}catch(e){}});
    }
  }
}

function toggleMetro(){
  metroOn=!metroOn;
  document.getElementById('metro-box').style.display=metroOn?'block':'none';
  document.getElementById('metro-toggle-btn').classList.toggle('on',metroOn);
  if(!map||typeof L==='undefined') return;
  if(metroOn&&!metroLines.m1) buildMetroLayers();
  else applyMetroVisibility();
}

function toggleLine(key){
  metroState[key]=document.getElementById('c'+key).checked;
  applyMetroVisibility();
}

function hideAllMetro(){
  for(const key of Object.keys(METRO)){metroState[key]=false;document.getElementById('c'+key).checked=false}
  applyMetroVisibility();
}

/* ═══════════════════════════════════════
   DAY FILTER
═══════════════════════════════════════ */
function filterDay(day,btn){
  currentFilter=day;
  document.querySelectorAll('.mctrl').forEach(b=>{
    b.classList.remove('on');b.style.background='';b.style.borderColor='';b.style.color='';
  });
  btn.classList.add('on');
  if(typeof day==='number'){
    btn.style.background=dayColor(day);btn.style.borderColor=dayColor(day);btn.style.color='#fff';
  }
  renderMap();
}

/* ═══════════════════════════════════════
   BUILD HTML – PLAN
═══════════════════════════════════════ */
function buildSegDetail(fromLat,fromLng,toLat,toLng,segKey){
  const safeKey=safeSeg(segKey);
  const wk=calcWalking(fromLat,fromLng,toLat,toLng);
  const metro=buildMetroSuggestion(fromLat,fromLng,toLat,toLng);

  let html=`<div class="seg-detail" id="sd-${safeKey}">`;

  // Walking option
  html+=`<div class="seg-opt">
    <div class="seg-opt-icon">🚶</div>
    <div class="seg-opt-body">
      <div class="seg-opt-title">Zu Fuß · ${fmtTime(wk.dur)}</div>
      <div class="seg-opt-desc">${fmtDist(wk.dist)} Fußweg (Touristentempo ~4 km/h)</div>
    </div>
  </div>`;

  // Metro option if available
  if(metro){
    const metroMin=Math.round(metro.metroSec/60);
    const walkAMin=Math.round(metro.walkToASec/60);
    const walkBMin=Math.round(metro.walkFromBSec/60);
    const mbadge=metro.route.line!=='transfer'?`<span class="seg-opt-badge" style="background:${metro.route.color};color:#fff">${metro.route.line.toUpperCase()}</span>`:`<span class="seg-opt-badge" style="background:#555;color:#fff">Umstieg</span>`;
    html+=`<div class="seg-opt">
      <div class="seg-opt-icon">🚇</div>
      <div class="seg-opt-body">
        <div class="seg-opt-title">U-Bahn · ~${metro.totalMin} Min gesamt</div>
        <div class="seg-opt-desc">
          🚶 ${walkAMin} Min → <b>${metro.stA.n}</b><br>
          🚇 ${metro.route.text} (~${metroMin} Min)<br>
          🚶 ${walkBMin} Min → Ziel<br>
          💶 Ticket ~€1,60 · Tageskarte ~€7
        </div>
        ${mbadge}
      </div>
    </div>`;
  }

  html+='</div>';
  return html;
}

function toggleSegDetail(segKey){
  const safeKey=safeSeg(segKey);
  let isNowOpen=false;
  document.querySelectorAll('[id="sd-'+safeKey+'"]').forEach(el=>{
    el.classList.toggle('open');
    isNowOpen=el.classList.contains('open');
  });
  document.querySelectorAll('[id="sr-'+safeKey+'"]').forEach(el=>{
    el.classList.toggle('expanded',isNowOpen);
  });
}

function buildPlanHTML(){
  return DAYS.map(day=>{
    const locs=locations.filter(l=>l.day===day.id);
    const routingLocs=locs.filter(l=>l.type!=='Flughafen');
    const c=day.color;

    // Precompute total walk distance for day header
    let totalDist=0;
    const chain=[{lat:HOTEL.lat,lng:HOTEL.lng},...routingLocs];
    for(let i=0;i<chain.length-1;i++){
      const w=calcWalking(chain[i].lat,chain[i].lng,chain[i+1].lat,chain[i+1].lng);
      totalDist+=w.dist;
    }

    let routingIdx=0;
    let cards='';

    locs.forEach(loc=>{
      if(loc.type==='Flughafen'){
        // Airport: show special transfer card, no segment row
        const isArrival=loc.time<'15:00';
        cards+=`<div class="airport-card" onclick="focusLoc(${loc.id})">
          <div class="airport-icon">✈️</div>
          <div class="airport-body">
            <div class="airport-name">${loc.name}</div>
            <div class="airport-sub">${loc.time} · ${loc.duration}</div>
            ${loc.busInfo?`<div class="transfer-info">${loc.busInfo}</div>`:''}
            ${loc.notes?`<div style="font-size:.68rem;color:var(--t3);margin-top:4px;font-style:italic">${loc.notes}</div>`:''}
          <a href="${gmapsViewUrl(loc.lat,loc.lng)}" target="_blank" onclick="event.stopPropagation()"
            style="display:inline-flex;align-items:center;gap:4px;margin-top:6px;
              background:#4285f4;color:#fff;padding:5px 10px;border-radius:7px;
              font-size:.68rem;font-weight:700;text-decoration:none">
            🧭 Maps öffnen
          </a>
          </div>
        </div>`;

        // After arrival → add hotel check-in hint
        if(isArrival){
          cards+=`<div class="hotel-checkin">
            <div class="hotel-checkin-icon">🏨</div>
            <div>
              <div class="hotel-checkin-text">Hotel Check-in · Izabella u. 61</div>
              <div class="hotel-checkin-sub">Koffer abgeben & frisch machen · dann Ausflug starten</div>
            </div>
          </div>`;
        }
        return;
      }

      // Segment row from previous point
      const from=chain[routingIdx];
      const wk=calcWalking(from.lat,from.lng,loc.lat,loc.lng);
      const segKey=`${from.id||'hotel'}->${loc.id}`;
      const safeKey=safeSeg(segKey);
      const metro=buildMetroSuggestion(from.lat,from.lng,loc.lat,loc.lng);
      const metroHint=metro?`<span class="seg-expand-btn">🚇 U-Bahn</span>`:'';

      cards+=`<div class="route-seg" id="sr-${safeKey}" onclick="toggleSegDetail('${segKey}')">
        <span class="seg-icon">🚶</span>
        <div class="seg-main">
          <div class="seg-info">${fmtTime(wk.dur)}</div>
          <div class="seg-dist">${fmtDist(wk.dist)}</div>
        </div>
        ${metroHint}
      </div>
      ${buildSegDetail(from.lat,from.lng,loc.lat,loc.lng,segKey)}`;

      // Location card
      const chips=[
        loc.price&&loc.price!=='–'?`<span class="chip chip-price">💶 ${loc.price}</span>`:'',
        loc.time?`<span class="chip chip-time">🕐 ${loc.time}${loc.duration?' · '+loc.duration:''}</span>`:'',
        loc.rating?`<span class="chip chip-star">⭐ ${loc.rating}</span>`:'',
        loc.hours?`<span class="chip chip-hours">🕐 ${loc.hours}</span>`:'',
        loc.busInfo?`<span class="chip chip-bus">🚌</span>`:'',
      ].join('');

      cards+=`<div class="loc-card" id="card-${loc.id}" onclick="focusLoc(${loc.id})">
        <div class="loc-num" style="background:${c}18;color:${c};border:1.5px solid ${c}44">${routingIdx+1}</div>
        <div class="loc-body">
          <div class="loc-name">${loc.name}</div>
          <div class="loc-cat">${loc.type}</div>
          ${chips?`<div class="loc-chips">${chips}</div>`:''}
        </div>
        <div class="loc-actions">
          <button class="ic" onclick="event.stopPropagation();focusLoc(${loc.id})" title="Karte">🗺</button>
          <a class="ic" href="${gmapsNavUrl(loc.lat,loc.lng,loc.name)}" target="_blank" onclick="event.stopPropagation()" title="In Google Maps navigieren" style="text-decoration:none">🧭</a>
          <button class="ic del" onclick="event.stopPropagation();deleteLoc(${loc.id})" title="Löschen">✕</button>
        </div>
      </div>`;

      routingIdx++;
      chain[routingIdx]={lat:loc.lat,lng:loc.lng,id:loc.id};
    });

    if(!locs.length) cards=`<div style="padding:12px 14px;font-size:.78rem;color:var(--t3);font-style:italic;">Keine Orte für diesen Tag.</div>`;

    const distLabel=totalDist>0?`<div class="day-dist">🚶 ${fmtDist(totalDist)}</div>`:'';

    return `<div class="day-block" id="db-${day.id}">
      <div class="day-head" onclick="toggleDay(${day.id})">
        <div class="day-stripe" style="background:${c}"></div>
        <div class="day-info">
          <div class="day-label" style="color:${c}">${day.label}</div>
          <div class="day-date">${day.date}</div>
        </div>
        <div class="day-meta">
          <div class="day-count">${routingLocs.length} Stopps</div>
          ${distLabel}
        </div>
        <span class="chev">▾</span>
      </div>
      <div class="day-body">${cards}</div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════
   BUILD HTML – OVERVIEW
═══════════════════════════════════════ */
function buildOvHTML(){
  const total=locations.filter(l=>l.type!=='Flughafen').length;
  let totalWalk=0;
  DAYS.forEach(day=>{
    const locs=locations.filter(l=>l.day===day.id&&l.type!=='Flughafen');
    const chain=[{lat:HOTEL.lat,lng:HOTEL.lng},...locs];
    for(let i=0;i<chain.length-1;i++) totalWalk+=calcWalking(chain[i].lat,chain[i].lng,chain[i+1].lat,chain[i+1].lng).dist;
  });

  const dayList=DAYS.map(day=>{
    const locs=locations.filter(l=>l.day===day.id);
    const rows=locs.map(l=>`<div class="ov-loc" onclick="focusLoc(${l.id})">
      <div class="ov-dot" style="background:${l.type==='Flughafen'?'#888':day.color}"></div>
      <span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${l.name}</span>
      ${l.hours&&l.type!=='Flughafen'?`<span style="font-size:.62rem;color:#6a24b4;flex-shrink:0;margin-left:4px" title="${l.hours}">⏰</span>`:''}
      ${l.price&&l.price!=='–'&&l.price!=='Kostenlos'&&l.price!=='Eintritt frei'?`<span class="ov-price">${l.price}</span>`:''}
      <a href="${gmapsNavUrl(l.lat,l.lng,l.name)}" target="_blank" onclick="event.stopPropagation()"
        title="Google Maps Navigation"
        style="flex-shrink:0;margin-left:4px;font-size:.8rem;text-decoration:none;opacity:.7">🧭</a>
    </div>`).join('');
    return `<div class="ov-day">
      <div class="ov-day-lbl" style="color:${day.color}">${day.label} – ${day.date}</div>
      ${rows}
    </div><div class="ov-sep"></div>`;
  }).join('');

  return `<div class="stats-grid">
    <div class="stat-box"><div class="stat-n">${total}</div><div class="stat-l">Stopps</div></div>
    <div class="stat-box"><div class="stat-n">5</div><div class="stat-l">Tage</div></div>
    <div class="stat-box"><div class="stat-n">${fmtDist(totalWalk)}</div><div class="stat-l">Fußweg gesamt</div></div>
  </div>
  <div class="ov-sep"></div>
  <div style="padding:6px 14px 4px;font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)">💡 Tip: ⏰ = Öffnungszeiten vorhanden (Popup öffnen)</div>
  <div class="ov-sep"></div>
  ${dayList}`;
}

      <span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:.78rem" title="${l.name}">${l.name}</span>
      <span style="font-size:.65rem;color:var(--t3);flex-shrink:0">T${l.day}</span>
      <button class="ic del" onclick="deleteLoc(${l.id})" style="opacity:1">✕</button>
    </div>`).join('')||'<div style="font-size:.78rem;color:var(--t3);font-style:italic;padding:4px 0">Keine Orte.</div>';
}

/* ═══════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════ */
function renderSidebar(){
  const plan=buildPlanHTML();
  const ov=buildOvHTML();
  const addD=buildAddHTML();
  const addM=buildAddHTML('-m');
  document.getElementById('dp-plan').innerHTML=plan;
  document.getElementById('dp-ov').innerHTML=ov;
  document.getElementById('dp-add').innerHTML=addD;
  document.getElementById('dplan').innerHTML=plan;
  document.getElementById('dov').innerHTML=ov;
  document.getElementById('dadd').innerHTML=addM;
}

function renderAll(){renderSidebar();renderMap()}

/* ═══════════════════════════════════════
   INTERACTIONS
═══════════════════════════════════════ */
function toggleDay(id){
  document.querySelectorAll(`[id="db-${id}"]`).forEach(el=>el.classList.toggle('closed'));
}

function focusLoc(id){
  const loc=locations.find(l=>l.id===id);
  if(!loc) return;
  if(map){
    if(loc._marker){
      map.setView([loc.lat,loc.lng],16,{animate:true});
      setTimeout(()=>loc._marker.openPopup(),300);
    } else {
      map.setView([loc.lat,loc.lng],16,{animate:true});
    }
  }
  highlightCard(id);
  // On mobile: close drawer to show map
  if(window.innerWidth<=700){
    setTimeout(()=>{
      document.getElementById('drawer').classList.remove('open');
      document.querySelectorAll('.mn-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('mn-map').classList.add('active');
    },150);
  }
}

function highlightCard(id){
  document.querySelectorAll('.loc-card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll(`#card-${id}`).forEach(c=>{
    c.classList.add('active');
    c.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}

function deleteLoc(id){
  if(!confirm('Ort wirklich löschen?')) return;
  locations=locations.filter(l=>l.id!==id);
  renderAll();
  showToast('Ort gelöscht');
}

function addLoc(prefix=''){
  const p=prefix;
  const name=document.getElementById('add-name'+p).value.trim();
  const lat=parseFloat(document.getElementById('add-lat'+p).value);
  const lng=parseFloat(document.getElementById('add-lng'+p).value);
  if(!name){showToast('⚠ Name erforderlich');return}
  if(isNaN(lat)||isNaN(lng)){showToast('⚠ Auf Karte tippen für Koordinaten!');return}
  const loc={
    id:nextId++,day:parseInt(document.getElementById('add-day'+p).value),
    name,type:document.getElementById('add-type'+p).value,lat,lng,
    price:document.getElementById('add-price'+p).value.trim()||null,
    time:document.getElementById('add-time'+p).value.trim()||null,
    duration:document.getElementById('add-dur'+p).value.trim()||null,
    rating:parseFloat(document.getElementById('add-rat'+p).value)||null,
    hours:document.getElementById('add-hours'+p).value.trim()||null,
    busInfo:document.getElementById('add-bus'+p).value.trim()||null,
    notes:document.getElementById('add-notes'+p).value.trim()||null,
    custom:true
  };
  locations.push(loc);
  clearAdd(p);
  renderAll();
  setTimeout(()=>focusLoc(loc.id),300);
  showToast(`✅ "${loc.name}" hinzugefügt`);
}

function clearAdd(prefix=''){
  const p=prefix;
  ['add-name','add-price','add-time','add-dur','add-lat','add-lng','add-notes','add-rat','add-bus','add-hours']
    .forEach(id=>{const el=document.getElementById(id+p);if(el)el.value=''});
}

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
function deskTab(name,btn){
  document.querySelectorAll('#desk-tabbar .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#desk-panel .pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('dp-'+name).classList.add('active');
}

function drawerTab(id,btn){
  document.querySelectorAll('.dtab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.dpane').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ═══════════════════════════════════════
   MOBILE NAV
═══════════════════════════════════════ */
function mobNav(target,btn){
  document.querySelectorAll('.mn-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const drawer=document.getElementById('drawer');
  if(target==='map'){drawer.classList.remove('open');return}
  drawer.classList.add('open');
  const tabMap={plan:'dplan',ov:'dov',add:'dadd'};
  document.querySelectorAll('.dtab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.dpane').forEach(p=>p.classList.remove('active'));
  const idx={plan:0,ov:1,add:2}[target]??0;
  const tabBtns=document.querySelectorAll('.dtab-btn');
  if(tabBtns[idx]) tabBtns[idx].classList.add('active');
  document.getElementById(tabMap[target]).classList.add('active');
}

function closeDrawer(){document.getElementById('drawer').classList.remove('open')}

let touchStartY=0;
document.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY},{passive:true});
document.addEventListener('touchmove',e=>{
  const drawer=document.getElementById('drawer');
  if(!drawer.classList.contains('open')) return;
  if(e.touches[0].clientY-touchStartY>60) closeDrawer();
},{passive:true});

/* ═══════════════════════════════════════
   SAVE / LOAD
═══════════════════════════════════════ */
function exportJSON(){
  const blob=new Blob([JSON.stringify({locations,nextId},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='budapest-2026.json';a.click();
  showToast('💾 Gespeichert!');
}

function openModal(){document.getElementById('modal-bg').classList.add('open')}
function closeModal(){document.getElementById('modal-bg').classList.remove('open')}
function importJSON(){
  try{
    const d=JSON.parse(document.getElementById('import-json').value);
    if(!d.locations) throw 0;
    locations=d.locations;if(d.nextId) nextId=d.nextId;
    renderAll();closeModal();showToast('✅ Plan importiert!');
  }catch{showToast('❌ Ungültiges Format')}
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

/* INIT */
document.addEventListener('DOMContentLoaded',()=>{
  renderSidebar();
  initMap();
});
</script>
</body>
</html>
