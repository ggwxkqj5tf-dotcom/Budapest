<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Budapest · Mai 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ═══════════════════════════════════════
   DESIGN SYSTEM – v8 · Warm paper aesthetic
═══════════════════════════════════════ */
:root{
  /* Surfaces – warm paper tones */
  --bg:#f7f3ec;
  --surface:#ffffff;
  --s2:#f1ebe0;
  --s3:#e7dfd0;
  --border:#e3dac8;
  --border2:#cdc1aa;

  /* Text – warm neutrals */
  --text:#1f1a14;
  --t2:#5a4f3f;
  --t3:#8d8472;
  --t4:#bcb19b;

  /* Brand – sophisticated, less neon */
  --red:#9a2c2a;          /* claret */
  --red-s:#fbeded;
  --green:#22663f;        /* forest */
  --green-s:#e9f1ec;
  --blue:#1d5b9c;         /* prussian */
  --blue-s:#e7eef7;
  --amber:#a86a22;        /* burnt */
  --amber-s:#f8eedf;
  --purple:#6f2f8a;       /* aubergine */
  --purple-s:#f1e8f3;

  /* Day colors – muted, harmonized */
  --d1:#b8541f;  /* burnt orange   */
  --d2:#1d6e3e;  /* forest green   */
  --d3:#1c5b9c;  /* prussian blue  */
  --d4:#7a3a8f;  /* mulberry       */
  --d5:#a8761d;  /* honey gold     */

  /* Crowd indicators */
  --crowd-low:#22663f;--crowd-med:#a86a22;--crowd-high:#9a2c2a;

  /* Shadows – soft, layered */
  --shadow-sm:0 1px 2px rgba(50,40,25,.06), 0 1px 1px rgba(50,40,25,.04);
  --shadow:0 1px 3px rgba(50,40,25,.07), 0 6px 18px -4px rgba(50,40,25,.10);
  --shadow-lg:0 4px 12px rgba(50,40,25,.08), 0 20px 40px -10px rgba(50,40,25,.14);

  /* Geometry */
  --hh:52px;--nh:60px;
  --r-xs:6px;--r-sm:9px;--r:13px;--r-lg:18px;

  /* Map */
  --map-tiles:https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png;
  --map-bg:#ece6d8;
  --popup-bg:var(--surface);
  --glass:rgba(255,253,247,.86);
  --glass-border:rgba(227,218,200,.7);
}

[data-theme="dark"]{
  --bg:#14110d;
  --surface:#1d1a14;
  --s2:#27231b;
  --s3:#332e23;
  --border:#3a3528;
  --border2:#4d4533;
  --text:#f3ecdc;
  --t2:#bdb39d;
  --t3:#8a8270;
  --t4:#5d5648;
  --red:#e26b5d;--red-s:#33191a;
  --green:#5ab37e;--green-s:#162a1f;
  --blue:#5fa3d9;--blue-s:#162435;
  --amber:#dba65c;--amber-s:#2c2113;
  --purple:#c780d6;--purple-s:#23172a;
  --d1:#dc7644;--d2:#3da06a;--d3:#4d8bce;--d4:#b067c2;--d5:#dba65c;
  --shadow-sm:0 1px 2px rgba(0,0,0,.5);
  --shadow:0 2px 6px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.4);
  --shadow-lg:0 6px 14px rgba(0,0,0,.55), 0 24px 48px rgba(0,0,0,.45);
  --map-bg:#1d1a14;
  --glass:rgba(29,26,20,.88);
  --glass-border:rgba(58,53,40,.7);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);transition:background .35s,color .35s;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-feature-settings:"cv11","ss01"}

/* Subtle paper grain on body bg */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:radial-gradient(circle at 20% 30%, rgba(168,118,29,.025) 0%, transparent 50%),
                   radial-gradient(circle at 80% 70%, rgba(28,91,156,.02) 0%, transparent 50%);
}
[data-theme="dark"] body::before{display:none}

/* ═══════════════════════════════════════
   HEADER – Collapsible
═══════════════════════════════════════ */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:600;
  background:var(--surface);border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-sm);transition:all .3s ease;overflow:hidden;
}
#hdr-main{
  display:flex;align-items:center;gap:10px;padding:0 14px;
  height:var(--hh);min-height:var(--hh);
}
.hdr-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--red),#7a1f1f);color:#fbe8d4;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:18px;font-weight:700;flex-shrink:0;box-shadow:0 1px 3px rgba(154,44,42,.35),inset 0 1px 0 rgba(255,255,255,.15);font-style:italic}
.hdr-name{font-family:'Fraunces',serif;font-size:1.02rem;font-weight:600;line-height:1.05;letter-spacing:-.015em;font-variation-settings:"opsz" 60}
.hdr-sub{font-size:.62rem;color:var(--t3);font-weight:500;letter-spacing:.02em;margin-top:1px}
.hdr-right{display:flex;gap:6px;margin-left:auto;align-items:center}
.hdr-chip{background:var(--s2);border:1px solid var(--border);color:var(--t2);padding:4px 10px;border-radius:20px;font-size:.62rem;font-weight:600;white-space:nowrap;letter-spacing:.01em}
@media(max-width:520px){.hdr-chip{display:none}}
.icon-btn{width:36px;height:36px;border:none;cursor:pointer;border-radius:10px;background:var(--s2);color:var(--t2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:.18s}
.icon-btn:hover{background:var(--s3);color:var(--text)}
.btn-save{height:34px;padding:0 14px;border:none;cursor:pointer;border-radius:10px;background:linear-gradient(180deg,var(--red),#7a1f1f);color:#fbe8d4;font-family:'Inter',sans-serif;font-size:.7rem;font-weight:600;white-space:nowrap;transition:.18s;box-shadow:0 1px 2px rgba(154,44,42,.3),inset 0 1px 0 rgba(255,255,255,.12);letter-spacing:.01em}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(154,44,42,.4),inset 0 1px 0 rgba(255,255,255,.15)}
.btn-save:active{transform:translateY(0)}

/* Header collapse toggle */
.hdr-collapse{
  width:34px;height:34px;border:none;cursor:pointer;border-radius:var(--r-sm);
  background:var(--s2);color:var(--t2);font-size:11px;
  display:none;align-items:center;justify-content:center;transition:.2s;
}
.hdr-collapse:hover{background:var(--s3)}
@media(max-width:700px){.hdr-collapse{display:flex}}

#hdr.collapsed{height:0;border-bottom:none;box-shadow:none;pointer-events:none;opacity:0}
#hdr-expand{
  display:none;position:fixed;top:6px;left:6px;z-index:601;
  width:36px;height:36px;border:1px solid var(--border);cursor:pointer;
  border-radius:10px;background:var(--glass);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:var(--t2);font-size:14px;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);transition:.2s;
}
#hdr-expand:hover{background:var(--s2)}
#hdr.collapsed~#hdr-expand{display:flex}

/* Theme toggle */
.theme-toggle{
  width:34px;height:34px;border:none;cursor:pointer;border-radius:var(--r-sm);
  background:var(--s2);color:var(--t2);font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:.3s;
}
.theme-toggle:hover{background:var(--s3);transform:rotate(20deg)}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
#app{position:fixed;top:var(--hh);left:0;right:0;bottom:0;display:flex;transition:top .3s;z-index:2}
#app.hdr-gone{top:0}
#sidebar{width:380px;min-width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:1px 0 3px rgba(50,40,25,.04)}
#map-wrap{flex:1;position:relative;min-width:0}
#map{width:100%;height:100%;background:var(--map-bg)}

/* ═══════════════════════════════════════
   MAP CONTROLS – Compact Horizontal
═══════════════════════════════════════ */
/* Top pill bar: horizontal scroll for day filters */
#map-top-bar{
  position:absolute;top:10px;left:54px;right:10px;z-index:400;
  display:flex;gap:5px;align-items:center;
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding:2px 0;
}
#map-top-bar::-webkit-scrollbar{display:none}
.mctrl{
  background:var(--glass);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--glass-border);border-radius:22px;
  padding:6px 13px;cursor:pointer;font-family:'Inter',sans-serif;
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--t2);box-shadow:var(--shadow-sm);transition:.18s;text-align:center;
  white-space:nowrap;flex-shrink:0;
}
.mctrl:hover{background:var(--s2);border-color:var(--border2);color:var(--text)}
.mctrl.on{background:var(--red);color:#fbe8d4;border-color:var(--red);box-shadow:0 1px 4px rgba(154,44,42,.35)}
.day-mctrl.on{color:#fff;border-color:transparent}
.mctrl-metro{border-radius:22px;padding:6px 11px;font-size:.78rem}

/* Metro box – floating popover, not in the bar */
#metro-box{
  display:none;position:absolute;top:48px;right:10px;z-index:410;
  background:var(--glass);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);
  border:1px solid var(--glass-border);border-radius:14px;padding:11px 13px;
  box-shadow:var(--shadow);min-width:165px;animation:fadeUp .22s ease;
}
#metro-box.open{display:block}
.metro-title{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:6px}
.metro-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.72rem;color:var(--t2);cursor:pointer;font-weight:500}
.metro-row input{accent-color:var(--red);width:13px;height:13px;cursor:pointer}
.mbadge{width:20px;height:20px;border-radius:5px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:800;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.metro-hide-btn{margin-top:7px;padding-top:6px;border-top:1px solid var(--border);width:100%;background:var(--s2);border:none;border-radius:7px;padding:5px 0;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);cursor:pointer;transition:.15s}
.metro-hide-btn:hover{background:var(--s3);color:var(--text)}

/* Legend */
#legend{position:absolute;bottom:12px;left:12px;z-index:400;
  background:var(--glass);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--glass-border);border-radius:11px;padding:8px 11px;
  box-shadow:var(--shadow-sm);font-size:.65rem}
.leg-title{font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-size:.58rem}
.leg-row{display:flex;align-items:center;gap:6px;color:var(--t2);margin:2px 0;font-weight:500}
.leg-line{width:18px;height:3px;border-radius:2px}
@media(max-width:700px){#legend{display:none}}

/* ═══════════════════════════════════════
   POPUP
═══════════════════════════════════════ */
.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:14px!important;box-shadow:var(--shadow-lg)!important;color:var(--text)!important}
.leaflet-popup-tip{background:var(--surface)!important;border:1px solid var(--border)!important}
.leaflet-popup-content{margin:14px 16px!important;font-family:'Inter',sans-serif!important;color:var(--text)!important;min-width:180px}
.pu-name{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;margin-bottom:3px;letter-spacing:-.01em;line-height:1.2}
.pu-cat{font-size:.68rem;color:var(--t3);margin-bottom:7px;font-weight:500;letter-spacing:.02em;text-transform:uppercase}
.pu-row{display:flex;align-items:center;gap:6px;font-size:.76rem;color:var(--t2);margin:3px 0;font-weight:500}
.pu-hours{background:var(--green-s);border-left:3px solid var(--green);padding:6px 9px;border-radius:0 7px 7px 0;font-size:.7rem;color:var(--green);margin-top:6px;font-weight:600}
.pu-tag{display:inline-block;margin-top:7px;padding:3px 10px;border-radius:7px;font-size:.65rem;font-weight:700;color:#fff;letter-spacing:.02em}
.pu-route{margin-top:8px;padding:6px 9px;border-radius:8px;background:var(--s2);border:1px solid var(--border)}
.pu-route-title{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:2px}
.pu-route-val{font-size:.76rem;font-weight:600;color:var(--text)}
.pu-crowd{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:.7rem;font-weight:600;padding:4px 9px;border-radius:7px}
.pu-crowd.low{background:var(--green-s);color:var(--green)}
.pu-crowd.med{background:var(--amber-s);color:var(--amber)}
.pu-crowd.high{background:var(--red-s);color:var(--red)}

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;padding:0 4px}
.tab-btn{flex:1;background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;padding:11px 4px;cursor:pointer;font-family:'Inter',sans-serif;font-size:.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab-btn .ti{font-size:.95rem}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}

/* PANEL */
.panel{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pane{display:none}.pane.active{display:block}

/* ═══════════════════════════════════════
   DAY BLOCKS
═══════════════════════════════════════ */
.day-block{border-bottom:1px solid var(--s3)}
.day-head{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;background:var(--surface);transition:.18s;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.day-head:hover{background:var(--s2)}
.day-stripe{width:3px;height:38px;border-radius:2px;flex-shrink:0;box-shadow:0 0 0 1px rgba(0,0,0,.04)}
.day-info{flex:1}
.day-label{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600;letter-spacing:-.01em;font-variation-settings:"opsz" 60}
.day-date{font-size:.68rem;color:var(--t3);margin-top:2px;font-weight:500;letter-spacing:.02em}
.day-meta{display:flex;gap:4px;align-items:center}
.day-count{background:var(--s2);border:1px solid var(--border);color:var(--t2);padding:3px 8px;border-radius:12px;font-size:.62rem;font-weight:700;letter-spacing:.02em}
.day-dist{font-size:.62rem;color:var(--t3);padding:3px 8px;background:var(--s2);border-radius:12px;border:1px solid var(--border);font-weight:600}
.chev{color:var(--t4);transition:.25s;font-size:.7rem;margin-left:2px}
.day-block.closed .chev{transform:rotate(-90deg)}
.day-body{background:var(--bg)}
.day-block.closed .day-body{display:none}

/* ═══════════════════════════════════════
   LOCATION CARDS
═══════════════════════════════════════ */
.loc-card{display:flex;align-items:flex-start;gap:11px;padding:11px 16px;cursor:pointer;transition:.18s;border-bottom:1px solid var(--border);background:var(--surface);position:relative}
.loc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:.2s}
.loc-card:hover{background:var(--s2)}
.loc-card.active{background:var(--red-s)}
.loc-card.active::before{background:var(--red)}
.loc-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;margin-top:1px;color:#fff;box-shadow:0 1px 2px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.18);font-family:'Inter',sans-serif;letter-spacing:-.01em}
.loc-body{flex:1;min-width:0}
.loc-name{font-weight:600;font-size:.88rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;letter-spacing:-.005em;line-height:1.2}
.loc-cat{font-size:.66rem;color:var(--t3);margin-top:2px;font-weight:500;letter-spacing:.01em;text-transform:uppercase}
.loc-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:10px;font-size:.62rem;font-weight:600;letter-spacing:.01em}
.chip-price{background:var(--green-s);color:var(--green)}
.chip-time{background:var(--s2);color:var(--t2)}
.chip-star{background:var(--amber-s);color:var(--amber)}
.chip-hours{background:var(--purple-s);color:var(--purple)}
.chip-bus{background:var(--blue-s);color:var(--blue);font-weight:700}
.chip-crowd{font-weight:700}
.chip-crowd.low{background:var(--green-s);color:var(--green)}
.chip-crowd.med{background:var(--amber-s);color:var(--amber)}
.chip-crowd.high{background:var(--red-s);color:var(--red)}
.chip-book{background:var(--blue-s);color:var(--blue);font-weight:700}

/* ═══════════════════════════════════════
   TICKET STATUS – Booking states
═══════════════════════════════════════ */
.chip-ticket{font-weight:800;text-transform:uppercase;letter-spacing:.03em;display:inline-flex;align-items:center;gap:3px}
.chip-ticket.available{background:#1e7a46;color:#fff}
.chip-ticket.limited{background:#c07020;color:#fff}
.chip-ticket.soldout{background:#c0392b;color:#fff;animation:pulseRed 2s ease-in-out infinite}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.5)}50%{box-shadow:0 0 0 5px rgba(192,57,43,0)}}

/* Big ticket banner inside loc-card */
.ticket-banner{
  display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;
  margin-top:6px;font-size:.7rem;font-weight:700;text-decoration:none;transition:.2s;
}
.ticket-banner.available{background:#e6f4ec;color:#1e7a46;border:1px solid #1e7a46}
.ticket-banner.available:hover{background:#1e7a46;color:#fff}
.ticket-banner.limited{background:#fff3e0;color:#c07020;border:1px solid #c07020}
.ticket-banner.limited:hover{background:#c07020;color:#fff}
.ticket-banner.soldout{background:#c0392b;color:#fff;border:2px solid #c0392b;font-weight:900;text-transform:uppercase;letter-spacing:.04em;cursor:default;animation:pulseRed 2.4s ease-in-out infinite}
.ticket-banner-icon{font-size:.95rem;flex-shrink:0}
.ticket-banner-text{flex:1;line-height:1.2}
.ticket-banner-arrow{font-size:.8rem;flex-shrink:0;font-weight:700}

/* Popup ticket section */
.pu-ticket{margin-top:7px;padding:6px 8px;border-radius:7px;font-size:.72rem;font-weight:700;display:flex;align-items:center;gap:5px}
.pu-ticket.available{background:#e6f4ec;color:#1e7a46;border-left:3px solid #1e7a46}
.pu-ticket.limited{background:#fff3e0;color:#c07020;border-left:3px solid #c07020}
.pu-ticket.soldout{background:#c0392b;color:#fff;text-transform:uppercase;letter-spacing:.04em;animation:pulseRed 2.4s infinite}
.pu-ticket a{color:inherit;font-weight:800;margin-left:auto;text-decoration:underline;font-size:.7rem}
.pu-ticket.soldout a{color:#fff}
.loc-actions{display:flex;gap:3px;opacity:0;transition:.2s;flex-shrink:0}
.loc-card:hover .loc-actions,.loc-card:active .loc-actions{opacity:1}
.ic{width:26px;height:26px;border:none;cursor:pointer;border-radius:6px;background:none;color:var(--t3);font-size:.78rem;display:flex;align-items:center;justify-content:center;transition:.15s}
.ic:hover{background:var(--s2);color:var(--text)}
.ic.del:hover{background:var(--red-s);color:var(--red)}

/* ═══════════════════════════════════════
   SEGMENT ROWS
═══════════════════════════════════════ */
.route-seg{
  display:flex;align-items:center;gap:9px;
  padding:7px 16px 7px 52px;background:var(--bg);
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:.18s;user-select:none;position:relative;
}
.route-seg::before{content:'';position:absolute;left:34px;top:0;bottom:0;width:2px;background:var(--border);background-image:linear-gradient(to bottom,var(--border) 50%,transparent 50%);background-size:2px 6px}
.route-seg:hover{background:var(--s3)}
.route-seg.expanded{background:var(--s2)}
.seg-icon{font-size:.85rem;flex-shrink:0;width:20px;text-align:center}
.seg-main{flex:1}
.seg-info{font-size:.7rem;color:var(--t2);font-weight:600;letter-spacing:.01em}
.seg-dist{font-size:.65rem;color:var(--t3);margin-top:1px}
.seg-expand-btn{font-size:.6rem;color:var(--t3);padding:3px 8px;background:var(--surface);border:1px solid var(--border);border-radius:11px;white-space:nowrap;flex-shrink:0;font-weight:600;letter-spacing:.02em}

/* Segment detail panel */
.seg-detail{display:none;background:var(--s2);border-bottom:1px solid var(--border);padding:9px 16px 11px 52px}
.seg-detail.open{display:block}
.seg-opt{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border-radius:10px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px;box-shadow:var(--shadow-sm)}
.seg-opt:last-child{margin-bottom:0}
.seg-opt-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
.seg-opt-body{flex:1}
.seg-opt-title{font-size:.74rem;font-weight:700;color:var(--text);letter-spacing:-.005em}
.seg-opt-desc{font-size:.66rem;color:var(--t2);margin-top:3px;line-height:1.5}
.seg-opt-badge{display:inline-block;margin-top:4px;padding:2px 8px;border-radius:9px;font-size:.6rem;font-weight:700;letter-spacing:.02em}

/* Airport & Hotel cards */
.airport-card{display:flex;align-items:flex-start;gap:11px;padding:12px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--s3),var(--s2));cursor:pointer;transition:.2s}
.airport-card:hover{background:var(--s3);transform:translateX(2px)}
.airport-icon{width:30px;height:30px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;box-shadow:var(--shadow-sm)}
.airport-body{flex:1}
.airport-name{font-weight:700;font-size:.86rem;letter-spacing:-.005em;font-family:'Fraunces',serif;font-variation-settings:"opsz" 60}
.airport-sub{font-size:.66rem;color:var(--t3);margin-top:2px;font-weight:500}
.transfer-info{background:var(--blue-s);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:6px 10px;margin-top:7px;font-size:.7rem;color:var(--blue);font-weight:500;line-height:1.5}
.hotel-checkin{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--amber-s),var(--surface));position:relative}
.hotel-checkin::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber)}
.hotel-checkin-icon{font-size:1.05rem;flex-shrink:0}
.hotel-checkin-text{font-size:.78rem;font-weight:700;color:var(--amber);letter-spacing:-.005em;font-family:'Fraunces',serif}
.hotel-checkin-sub{font-size:.66rem;color:var(--t2);margin-top:2px;font-weight:500}

/* ═══════════════════════════════════════
   ADD FORM
═══════════════════════════════════════ */
.add-wrap{padding:14px 16px}
.add-wrap h3{font-family:'Fraunces',serif;font-size:1.05rem;margin-bottom:13px;font-weight:600;letter-spacing:-.01em;font-variation-settings:"opsz" 80}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3)}
.fg input,.fg select,.fg textarea{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:9px 11px;border-radius:9px;font-family:'Inter',sans-serif;font-size:.82rem;outline:none;width:100%;transition:.18s;font-weight:500}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--red);background:var(--surface);box-shadow:0 0 0 3px rgba(154,44,42,.08)}
.fg textarea{resize:vertical;min-height:48px;line-height:1.5}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tip-box{background:var(--amber-s);border-left:3px solid var(--amber);padding:8px 11px;border-radius:0 8px 8px 0;font-size:.72rem;color:var(--t2);margin-bottom:11px;line-height:1.5}
.btn-row{display:flex;gap:7px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;transition:.18s;letter-spacing:.01em}
.btn-r{background:linear-gradient(180deg,var(--red),#7a1f1f);color:#fbe8d4;box-shadow:0 1px 3px rgba(154,44,42,.3),inset 0 1px 0 rgba(255,255,255,.1)}
.btn-r:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(154,44,42,.4),inset 0 1px 0 rgba(255,255,255,.15)}
.btn-g{background:var(--s2);color:var(--t2);border:1px solid var(--border)}
.btn-g:hover{background:var(--s3);color:var(--text)}
.manage-item{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.78rem}
.manage-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ═══════════════════════════════════════
   OVERVIEW
═══════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:14px 16px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;box-shadow:var(--shadow-sm);transition:.2s}
.stat-box:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.stat-n{font-family:'Fraunces',serif;font-size:1.55rem;color:var(--red);font-weight:600;letter-spacing:-.02em;line-height:1;font-variation-settings:"opsz" 144}
.stat-l{font-size:.62rem;color:var(--t3);margin-top:4px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.ov-sep{height:1px;background:var(--border);margin:0 16px 6px}
.ov-section-title{padding:9px 16px 4px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3)}
.ov-day{padding:6px 16px}
.ov-day-lbl{font-family:'Fraunces',serif;font-size:.92rem;font-weight:600;margin-bottom:5px;letter-spacing:-.01em;font-variation-settings:"opsz" 60}
.ov-loc{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:7px;cursor:pointer;transition:.15s;font-size:.76rem;font-weight:500}
.ov-loc:hover{background:var(--s2)}
.ov-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ov-price{margin-left:auto;font-size:.66rem;color:var(--green);white-space:nowrap;font-weight:600}
.ov-crowd{font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:9px;white-space:nowrap;flex-shrink:0;letter-spacing:.02em}
.ov-crowd.low{background:var(--green-s);color:var(--green)}
.ov-crowd.med{background:var(--amber-s);color:var(--amber)}
.ov-crowd.high{background:var(--red-s);color:var(--red)}
.ov-book{font-size:.56rem;font-weight:700;padding:2px 6px;border-radius:9px;background:var(--blue-s);color:var(--blue);white-space:nowrap;flex-shrink:0;letter-spacing:.02em}

/* Booking summary table */
.booking-table{margin:8px 16px 12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
.booking-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:.74rem;font-weight:500}
.booking-row:last-child{border-bottom:none}
.booking-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.booking-name{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.booking-badge{padding:3px 9px;border-radius:9px;font-size:.6rem;font-weight:700;letter-spacing:.02em}
.booking-badge.must{background:var(--red-s);color:var(--red)}
.booking-badge.rec{background:var(--amber-s);color:var(--amber)}
.booking-badge.free{background:var(--green-s);color:var(--green)}

/* ═══════════════════════════════════════
   MOBILE NAV
═══════════════════════════════════════ */
#mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:700;height:var(--nh);
  background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -2px 16px rgba(50,40,25,.08);padding-bottom:env(safe-area-inset-bottom,0)}
.mn-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:'Inter',sans-serif;font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);padding:7px 0;min-height:48px;transition:.2s}
.mn-btn .mi{font-size:1.1rem;transition:.2s}
.mn-btn.active{color:var(--red)}
.mn-btn.active .mi{transform:scale(1.1)}

/* DRAWER */
#drawer{display:flex;flex-direction:column;position:fixed;bottom:var(--nh);left:0;right:0;z-index:650;background:var(--surface);border-top:1px solid var(--border);border-radius:18px 18px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:calc(100svh - var(--hh) - var(--nh) - 10px);box-shadow:0 -8px 32px rgba(50,40,25,.16)}
#drawer.open{transform:translateY(0)}
#drawer-handle{display:flex;justify-content:center;padding:10px 0 6px;cursor:pointer;flex-shrink:0}
.handle-bar{width:36px;height:4px;border-radius:3px;background:var(--t4)}
.dtab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);padding:0 4px}
.dtab-btn{flex:1;background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;padding:10px 4px;cursor:pointer;font-family:'Inter',sans-serif;font-size:.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;transition:.2s}
.dtab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.drawer-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dpane{display:none}.dpane.active{display:block}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;z-index:800;background:rgba(31,26,20,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px;animation:fadeBg .2s ease}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
#modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:22px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.modal h3{font-family:'Fraunces',serif;font-size:1.1rem;margin-bottom:10px;font-weight:600;letter-spacing:-.01em;font-variation-settings:"opsz" 80}
.modal textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:11px;border-radius:9px;font-family:'JetBrains Mono',monospace;font-size:.74rem;height:140px;resize:none;outline:none;line-height:1.5}
.modal textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(154,44,42,.08)}
.modal-foot{display:flex;gap:7px;justify-content:flex-end;margin-top:12px}

/* TOAST */
#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:30px;font-size:.78rem;font-weight:600;z-index:9999;transition:transform .3s ease,opacity .3s;white-space:nowrap;box-shadow:var(--shadow-lg);pointer-events:none;opacity:0;letter-spacing:.01em}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* COORD BADGE */
#coord-badge{
  display:none;position:fixed;bottom:74px;left:50%;transform:translateX(-50%);z-index:500;
  background:var(--glass);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--glass-border);border-radius:22px;padding:6px 14px 6px 12px;
  box-shadow:var(--shadow);font-size:.72rem;font-weight:600;color:var(--t2);
  align-items:center;gap:7px;cursor:default;animation:fadeUp .25s ease;letter-spacing:.01em;
}
#coord-badge.visible{display:inline-flex}
#coord-badge .cb-close{
  width:20px;height:20px;border:none;cursor:pointer;border-radius:50%;
  background:var(--s3);color:var(--t3);font-size:10px;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
#coord-badge .cb-close:hover{background:var(--red-s);color:var(--red)}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media(max-width:700px){
  #sidebar{display:none}
  #mob-nav{display:flex}
  #app{bottom:var(--nh)}
}
@media(min-width:701px){
  #mob-nav{display:none!important}
  #drawer{display:none!important}
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t4)}

/* Dark mode map filter */
[data-theme="dark"] .leaflet-tile-pane{filter:brightness(.82) contrast(1.05) saturate(.9)}
[data-theme="dark"] .leaflet-popup-content-wrapper{box-shadow:0 4px 24px rgba(0,0,0,.5)!important}
</style>
</head>
<body>

<!-- HEADER -->
<header id="hdr">

</div>

<div id="drawer">

let locations=[

/* ═══════════════════════════════════════
   UTILITY FUNCTIONS
═══════════════════════════════════════ */
const dayColor=d=>DAY_COLORS[d]||'#888';

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,r=Math.PI/180,dLat=(lat2-lat1)*r,dLng=(lng2-lng1)*r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function calcWalking(lat1,lng1,lat2,lng2){
  const straight=haversine(lat1,lng1,lat2,lng2);
  const dist=straight*1.35; // street detour
  return{dist,dur:dist/(4000/3600)}; // 4 km/h tourist pace
}

const fmtDist=m=>m<1000?`${Math.round(m)} m`:`${(m/1000).toFixed(1)} km`;
const fmtTime=s=>{const m=Math.round(s/60);return m<1?'<1 Min':m<60?`${m} Min`:`${Math.floor(m/60)}h ${m%60?` ${m%60} Min`:''}`};

function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'');
  document.querySelector('.theme-toggle').textContent=isDark?'☀️':'🌙';
  // Update map tiles for dark mode
  if(map&&typeof L!=='undefined'){
    map.eachLayer(l=>{if(l._url&&l._url.includes('carto'))map.removeLayer(l)});
    const tileUrl=isDark
      ?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      :'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    L.tileLayer(tileUrl,{attribution:'© OpenStreetMap, © CARTO',maxZoom:19}).addTo(map);
  }
}

function showCoordBadge(lat,lng){
  const badge=document.getElementById('coord-badge');
  document.getElementById('coord-text').textContent=`📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  badge.classList.add('visible');
  // Fill add forms
  ['add-lat','add-lat-m'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=lat.toFixed(6)});
  ['add-lng','add-lng-m'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=lng.toFixed(6)});
  clearTimeout(coordTimer);
  coordTimer=setTimeout(hideCoordBadge,4000);
}
function hideCoordBadge(){
  document.getElementById('coord-badge').classList.remove('visible');
  clearTimeout(coordTimer);
}

function findNearestStation(lat,lng){
  let best=null,bestDist=Infinity;
  for(const[key,data]of Object.entries(METRO)){
    for(const s of data.stations){
      const d=haversine(lat,lng,s.lat,s.lng);
      if(d<bestDist){bestDist=d;best={...s,line:key,lineColor:data.color,lineName:data.name,dist:d}}
    }
  }
  return best;
}

function findMetroRoute(stA,stB){
  if(stA.line===stB.line) return{text:`${stA.lineName}: ${stA.n} → ${stB.n}`,color:stA.lineColor,line:stA.line,direct:true};
  const DEAK=['m1','m2','m3'];
  if(DEAK.includes(stA.line)&&DEAK.includes(stB.line)){
    return{text:`${METRO[stA.line].name}: ${stA.n} → Deák · Umstieg · ${METRO[stB.line].name}: Deák → ${stB.n}`,color:stA.lineColor,line:'transfer',direct:false};
  }
  return null;
}

function buildMetroSuggestion(fromLat,fromLng,toLat,toLng){
  const stA=findNearestStation(fromLat,fromLng),stB=findNearestStation(toLat,toLng);
  if(!stA||!stB||stA.dist>1000||stB.dist>1000) return null;
  const route=findMetroRoute(stA,stB);
  if(!route) return null;
  const walkToA=calcWalking(fromLat,fromLng,stA.lat,stA.lng);
  const walkFromB=calcWalking(stB.lat,stB.lng,toLat,toLng);
  const metroDist=haversine(stA.lat,stA.lng,stB.lat,stB.lng)*1.1;
  const metroTime=metroDist/(30000/3600);
  return{route,stA,stB,walkToASec:walkToA.dur,walkFromBSec:walkFromB.dur,metroSec:metroTime,totalMin:Math.round((walkToA.dur+metroTime+walkFromB.dur)/60)};
}

function renderMap(){
  if(!map||typeof L==='undefined') return;
  locations.forEach(l=>{l._marker=null});
  [...routeLayers,...markerLayers].forEach(l=>{try{map.removeLayer(l)}catch(e){}});
  routeLayers=[];markerLayers=[];

  const filtered=currentFilter==='all'?locations:locations.filter(l=>l.day===currentFilter);
  const dayGroups={};
  filtered.forEach(loc=>{
    if(loc.type==='Flughafen'||loc.type==='Hotel') return;
    if(!dayGroups[loc.day]) dayGroups[loc.day]=[];
    dayGroups[loc.day].push(loc);
  });

  // Routes – clean lines only, NO walk labels on map
  for(const[day,locs]of Object.entries(dayGroups)){
    const c=dayColor(parseInt(day));
    const chain=[{lat:HOTEL.lat,lng:HOTEL.lng},...locs];
    for(let i=0;i<chain.length-1;i++){
      const from=chain[i],to=chain[i+1];
      const poly=L.polyline([[from.lat,from.lng],[to.lat,to.lng]],{
        color:c,weight:3,opacity:.55,dashArray:'8,5',lineJoin:'round'
      }).addTo(map);
      routeLayers.push(poly);
    }
  }

  // Markers
  const dayIdx={};
  filtered.forEach(loc=>{
    if(loc.type==='Hotel') return; // Hotel marker added separately at top
    const c=dayColor(loc.day);
    if(!dayIdx[loc.day]) dayIdx[loc.day]=0;
    let iconHtml;
    if(loc.type==='Flughafen'){
      iconHtml=`<div style="background:var(--surface,#fff);border:2px solid #888;border-radius:8px;padding:3px 9px;font-family:'Inter',sans-serif;font-size:.62rem;font-weight:700;color:#555;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.18)">✈ ${loc.day===1?'Ankunft':'Abflug'}</div>`;
    } else {
      dayIdx[loc.day]++;
      iconHtml=`<div style="width:30px;height:30px;border-radius:50%;background:${c};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.28);font-family:'Inter',sans-serif">${dayIdx[loc.day]}</div>`;
    }

    const marker=L.marker([loc.lat,loc.lng],{
      icon:L.divIcon({className:'',html:iconHtml,iconSize:[30,30],iconAnchor:[15,15]}),
      zIndexOffset:loc.type==='Flughafen'?0:100
    }).addTo(map);

    const hoursHtml=loc.hours?`<div class="pu-hours">🕐 ${loc.hours}</div>`:'';
    const priceHtml=loc.price&&loc.price!=='–'?`<div class="pu-row">💶 ${loc.price}</div>`:'';
    const timeHtml=loc.time?`<div class="pu-row">📍 Ab ${loc.time}${loc.duration?' · '+loc.duration:''}</div>`:'';
    const starHtml=loc.rating?`<div class="pu-row">⭐ ${loc.rating}/5</div>`:'';
    const busHtml=loc.busInfo?`<div class="pu-route"><div class="pu-route-title">Verbindung</div><div class="pu-route-val">${loc.busInfo}</div></div>`:'';
    const notesHtml=loc.notes?`<div style="margin-top:5px;font-size:.7rem;color:var(--t3);font-style:italic">${loc.notes}</div>`:'';
    const crowdHtml=loc.crowd?`<div class="pu-crowd ${loc.crowd}">${crowdIcon[loc.crowd]} ${crowdLabel[loc.crowd]}</div>`:'';
    const bookHtml=loc.booking==='must'?`<div class="pu-row" style="color:var(--red);font-weight:700">🎫 Online-Buchung Pflicht!</div>`:loc.booking==='recommended'?`<div class="pu-row" style="color:var(--amber);font-weight:600">🎫 Vorbuchung empfohlen</div>`:'';
    const ticketHtml=loc.ticketStatus?(()=>{
      const s=ticketStatusLabel[loc.ticketStatus];
      const link=loc.ticketUrl&&loc.ticketStatus!=='soldout'
        ?`<a href="${loc.ticketUrl}" target="_blank">Kaufen →</a>`
        :loc.ticketUrl?`<a href="${loc.ticketUrl}" target="_blank">Prüfen →</a>`:'';
      return `<div class="pu-ticket ${loc.ticketStatus}">${s.icon} ${s.txt} ${link}</div>`;
    })():'';
    const dayObj=DAYS[loc.day-1];

    marker.bindPopup(`
      <div class="pu-name">${loc.name}</div><div class="pu-cat">${loc.type}</div>
      ${priceHtml}${timeHtml}${starHtml}${crowdHtml}${bookHtml}${ticketHtml}${hoursHtml}${busHtml}${notesHtml}
      <div class="pu-tag" style="background:${c}">${dayObj.label} · ${dayObj.date}</div>
      <div style="margin-top:7px;display:flex;gap:4px">
        <a href="${gmapsNav(loc.lat,loc.lng)}" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;background:#4285f4;color:#fff;padding:7px 9px;border-radius:9px;font-family:'Inter',sans-serif;font-size:.7rem;font-weight:600;text-decoration:none;letter-spacing:.01em">🧭 Navigation</a>
        <a href="${gmapsView(loc.lat,loc.lng)}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:4px;background:var(--s2);color:var(--t2);padding:7px 9px;border-radius:9px;font-family:'Inter',sans-serif;font-size:.7rem;font-weight:600;text-decoration:none;border:1px solid var(--border)">📍</a>
      </div>`,{maxWidth:260});

    marker.on('click',()=>highlightCard(loc.id));
    markerLayers.push(marker);
    loc._marker=marker;
  });
}

/* ═══════════════════════════════════════
   METRO LAYERS
═══════════════════════════════════════ */
function buildMetroLayers(){
  for(const[key,data]of Object.entries(METRO)){
    if(metroLines[key]) continue;
    metroLines[key]=L.polyline(data.stations.map(s=>[s.lat,s.lng]),{color:data.color,weight:4,opacity:.8});
    metroDots[key]=data.stations.map(s=>{
      const icon=L.divIcon({className:'',html:`<div style="width:9px;height:9px;border-radius:50%;background:${data.color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,iconSize:[9,9],iconAnchor:[4,4]});
      return L.marker([s.lat,s.lng],{icon,interactive:true}).bindTooltip(`<b style="font-size:.72rem">${s.n}</b><br><span style="font-size:.65rem;color:#888">${data.name}</span>`,{direction:'top',offset:[0,-5]});
    });
  }
  applyMetroVisibility();
}

function applyMetroVisibility(){
  for(const key of Object.keys(METRO)){
    const on=metroOn&&metroState[key];
    if(on){metroLines[key]?.addTo(map);metroDots[key].forEach(m=>m.addTo(map))}
    else{if(metroLines[key])try{map.removeLayer(metroLines[key])}catch(e){};metroDots[key].forEach(m=>{try{map.removeLayer(m)}catch(e){}})}
  }
}

function toggleMetro(){
  metroOn=!metroOn;
  const box=document.getElementById('metro-box');
  box.classList.toggle('open',metroOn);
  document.getElementById('metro-toggle-btn').classList.toggle('on',metroOn);
  if(!map||typeof L==='undefined') return;
  if(metroOn&&!metroLines.m1) buildMetroLayers();
  else applyMetroVisibility();
}
function toggleLine(key){metroState[key]=document.getElementById('c'+key).checked;applyMetroVisibility()}
function hideAllMetro(){for(const key of Object.keys(METRO)){metroState[key]=false;document.getElementById('c'+key).checked=false};applyMetroVisibility()}

function filterDay(day,btn){
  currentFilter=day;
  document.querySelectorAll('.mctrl').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.borderColor='';b.style.color=''});
  btn.classList.add('on');
  if(typeof day==='number'){btn.style.background=dayColor(day);btn.style.borderColor=dayColor(day);btn.style.color='#fff'}
  renderMap();
}

function buildSegDetail(fromLat,fromLng,toLat,toLng,segKey){
  const safeKey=safeSeg(segKey);
  const wk=calcWalking(fromLat,fromLng,toLat,toLng);
  const metro=buildMetroSuggestion(fromLat,fromLng,toLat,toLng);
  let html=`<div class="seg-detail" id="sd-${safeKey}">`;
  html+=`<div class="seg-opt"><div class="seg-opt-icon">🚶</div><div class="seg-opt-body"><div class="seg-opt-title">Zu Fuß · ${fmtTime(wk.dur)}</div><div class="seg-opt-desc">${fmtDist(wk.dist)} (Touristentempo ~4 km/h)</div></div></div>`;
  if(metro){
    const mbadge=metro.route.line!=='transfer'?`<span class="seg-opt-badge" style="background:${metro.route.color};color:#fff">${metro.route.line.toUpperCase()}</span>`:`<span class="seg-opt-badge" style="background:#555;color:#fff">Umstieg</span>`;
    html+=`<div class="seg-opt"><div class="seg-opt-icon">🚇</div><div class="seg-opt-body"><div class="seg-opt-title">U-Bahn · ~${metro.totalMin} Min</div><div class="seg-opt-desc">🚶 ${Math.round(metro.walkToASec/60)} Min → <b>${metro.stA.n}</b><br>🚇 ${metro.route.text} (~${Math.round(metro.metroSec/60)} Min)<br>🚶 ${Math.round(metro.walkFromBSec/60)} Min → Ziel<br>💶 ~€1,60 · Tageskarte ~€7</div>${mbadge}</div></div>`;
  }
  return html+'</div>';
}

function toggleSegDetail(segKey){
  const safeKey=safeSeg(segKey);
  let isOpen=false;
  document.querySelectorAll(`[id="sd-${safeKey}"]`).forEach(el=>{el.classList.toggle('open');isOpen=el.classList.contains('open')});
  document.querySelectorAll(`[id="sr-${safeKey}"]`).forEach(el=>el.classList.toggle('expanded',isOpen));
}

  return DAYS.map(day=>{
    const locs=locations.filter(l=>l.day===day.id);
    const routingLocs=locs.filter(l=>l.type!=='Flughafen'&&l.type!=='Hotel');
    const c=day.color;
    let totalDist=0;
    const chain=[{lat:HOTEL.lat,lng:HOTEL.lng},...routingLocs];
    for(let i=0;i<chain.length-1;i++) totalDist+=calcWalking(chain[i].lat,chain[i].lng,chain[i+1].lat,chain[i+1].lng).dist;

    let routingIdx=0, cards='';
    locs.forEach(loc=>{
      if(loc.type==='Flughafen'){
        cards+=`<div class="airport-card" onclick="focusLoc(${loc.id})"><div class="airport-icon">✈️</div><div class="airport-body"><div class="airport-name">${loc.name}</div><div class="airport-sub">${loc.time} · ${loc.duration}</div>${loc.busInfo?`<div class="transfer-info">${loc.busInfo}</div>`:''}${loc.notes?`<div style="font-size:.66rem;color:var(--t3);margin-top:5px;font-style:italic;line-height:1.5">${loc.notes}</div>`:''}<a href="${gmapsView(loc.lat,loc.lng)}" target="_blank" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:5px;margin-top:7px;background:#4285f4;color:#fff;padding:5px 11px;border-radius:8px;font-size:.66rem;font-weight:600;text-decoration:none;letter-spacing:.01em">🧭 In Maps öffnen</a></div></div>`;
        return;
      }
      if(loc.type==='Hotel'){
        cards+=`<div class="hotel-checkin" onclick="focusLoc(${loc.id})" style="cursor:pointer"><div class="hotel-checkin-icon">🏨</div><div style="flex:1"><div class="hotel-checkin-text">${loc.name} · ${loc.time}</div><div class="hotel-checkin-sub">${loc.notes||'Izabella u. 61, 1064 Budapest'}</div></div></div>`;
        return;
      }

      const from=chain[routingIdx];
      const wk=calcWalking(from.lat,from.lng,loc.lat,loc.lng);
      const segKey=`${from.id||'hotel'}->${loc.id}`;
      const safeKey=safeSeg(segKey);
      const metro=buildMetroSuggestion(from.lat,from.lng,loc.lat,loc.lng);

      cards+=`<div class="route-seg" id="sr-${safeKey}" onclick="toggleSegDetail('${segKey}')"><span class="seg-icon">🚶</span><div class="seg-main"><div class="seg-info">${fmtTime(wk.dur)}</div><div class="seg-dist">${fmtDist(wk.dist)}</div></div>${metro?'<span class="seg-expand-btn">🚇 U-Bahn</span>':''}</div>${buildSegDetail(from.lat,from.lng,loc.lat,loc.lng,segKey)}`;

      const chips=[
        loc.price&&loc.price!=='–'?`<span class="chip chip-price">💶 ${loc.price}</span>`:'',
        loc.time?`<span class="chip chip-time">🕐 ${loc.time}${loc.duration?' · '+loc.duration:''}</span>`:'',
        loc.rating?`<span class="chip chip-star">⭐ ${loc.rating}</span>`:'',
        loc.crowd?`<span class="chip chip-crowd ${loc.crowd}">${crowdIcon[loc.crowd]} ${crowdLabel[loc.crowd]}</span>`:'',
        loc.ticketStatus?`<span class="chip chip-ticket ${loc.ticketStatus}">${ticketStatusLabel[loc.ticketStatus].short}</span>`:'',
        loc.booking==='must'&&!loc.ticketStatus?`<span class="chip chip-book">🎫 Pflicht</span>`:loc.booking==='recommended'&&!loc.ticketStatus?`<span class="chip chip-book">🎫 Empf.</span>`:'',
        loc.busInfo?`<span class="chip chip-bus">🚌</span>`:'',
      ].filter(Boolean).join('');

      // Ticket banner – prominent CTA inside card
      let ticketBanner='';
      if(loc.ticketStatus==='soldout'){
        ticketBanner=`<div class="ticket-banner soldout"><span class="ticket-banner-icon">❌</span><span class="ticket-banner-text">Ausgebucht für Mai 2026${loc.ticketUrl?' · jegymester.hu prüfen':''}</span></div>`;
      } else if(loc.ticketStatus==='limited'&&loc.ticketUrl){
        ticketBanner=`<a href="${loc.ticketUrl}" target="_blank" class="ticket-banner limited" onclick="event.stopPropagation()"><span class="ticket-banner-icon">⚠️</span><span class="ticket-banner-text">Nur wenige Tickets · Jetzt online sichern</span><span class="ticket-banner-arrow">→</span></a>`;
      } else if(loc.ticketStatus==='available'&&loc.ticketUrl&&(loc.booking==='must'||loc.booking==='recommended')){
        ticketBanner=`<a href="${loc.ticketUrl}" target="_blank" class="ticket-banner available" onclick="event.stopPropagation()"><span class="ticket-banner-icon">🎫</span><span class="ticket-banner-text">Offizielle Tickets buchen</span><span class="ticket-banner-arrow">→</span></a>`;
      }

      cards+=`<div class="loc-card" id="card-${loc.id}" onclick="focusLoc(${loc.id})"><div class="loc-num" style="background:${c}18;color:${c};border:1.5px solid ${c}44">${routingIdx+1}</div><div class="loc-body"><div class="loc-name">${loc.name}</div><div class="loc-cat">${loc.type}</div>${chips?`<div class="loc-chips">${chips}</div>`:''}${ticketBanner}</div><div class="loc-actions"><button class="ic" onclick="event.stopPropagation();focusLoc(${loc.id})" title="Karte">🗺</button><a class="ic" href="${gmapsNav(loc.lat,loc.lng)}" target="_blank" onclick="event.stopPropagation()" title="Navigation" style="text-decoration:none">🧭</a><button class="ic del" onclick="event.stopPropagation();deleteLoc(${loc.id})" title="Löschen">✕</button></div></div>`;

      routingIdx++;
      chain[routingIdx]={lat:loc.lat,lng:loc.lng,id:loc.id};
    });

    if(!locs.length) cards=`<div style="padding:10px 14px;font-size:.75rem;color:var(--t3);font-style:italic">Keine Orte.</div>`;
    return `<div class="day-block" id="db-${day.id}"><div class="day-head" onclick="toggleDay(${day.id})"><div class="day-stripe" style="background:${c}"></div><div class="day-info"><div class="day-label" style="color:${c}">${day.label}</div><div class="day-date">${day.date}</div></div><div class="day-meta"><div class="day-count">${routingLocs.length} Stopps</div>${totalDist>0?`<div class="day-dist">🚶 ${fmtDist(totalDist)}</div>`:''}</div><span class="chev">▾</span></div><div class="day-body">${cards}</div></div>`;
  }).join('');
}

/* ═══════════════════════════════════════
   BUILD OVERVIEW HTML – with Crowd & Booking

function buildOvHTML(){
  const total=locations.filter(l=>l.type!=='Flughafen'&&l.type!=='Hotel').length;
  let totalWalk=0;
  DAYS.forEach(day=>{
    const locs=locations.filter(l=>l.day===day.id&&l.type!=='Flughafen'&&l.type!=='Hotel');
    const chain=[{lat:HOTEL.lat,lng:HOTEL.lng},...locs];
    for(let i=0;i<chain.length-1;i++) totalWalk+=calcWalking(chain[i].lat,chain[i].lng,chain[i+1].lat,chain[i+1].lng).dist;
  });

  // Ticket status overview – grouped by status
  const soldOut=locations.filter(l=>l.ticketStatus==='soldout');
  const limited=locations.filter(l=>l.ticketStatus==='limited');
  const available=locations.filter(l=>l.ticketStatus==='available'&&(l.booking==='must'||l.booking==='recommended'));

  let bookingSection='';
  if(soldOut.length){
    let rows='';
    soldOut.forEach(l=>{
      const link=l.ticketUrl?`<a href="${l.ticketUrl}" target="_blank" onclick="event.stopPropagation()" style="color:#fff;text-decoration:underline;font-size:.62rem;font-weight:800">Prüfen →</a>`:'';

    });
    bookingSection+=`<div class="ov-section-title" style="color:#c0392b;font-weight:800">⚠️ AUSGEBUCHT für Mai 2026</div><div class="booking-table" style="border-color:#c0392b;animation:pulseRed 2.5s infinite">${rows}</div>`;
  }
  if(limited.length){
    let rows='';
    limited.forEach(l=>{
      const link=l.ticketUrl?`<a href="${l.ticketUrl}" target="_blank" onclick="event.stopPropagation()" style="color:#c07020;text-decoration:underline;font-size:.62rem;font-weight:800">Kaufen →</a>`:'';
      rows+=`<div class="booking-row"><div class="booking-dot" style="background:${dayColor(l.day)}"></div><span class="booking-name">${l.name}</span><span style="font-size:.6rem;color:var(--t3)">T${l.day}</span><span class="booking-badge" style="background:#fff3e0;color:#c07020">⚠ Knapp</span>${link}</div>`;
    });
    bookingSection+=`<div class="ov-section-title" style="color:#c07020">⚠️ Wenige Tickets übrig – schnell buchen!</div><div class="booking-table">${rows}</div>`;
  }
  if(available.length){
    let rows='';
    available.forEach(l=>{
      const link=l.ticketUrl?`<a href="${l.ticketUrl}" target="_blank" onclick="event.stopPropagation()" style="color:#1e7a46;text-decoration:underline;font-size:.62rem;font-weight:800">Kaufen →</a>`:'';
      const badge=l.booking==='must'?`<span class="booking-badge must">🎫 Pflicht</span>`:`<span class="booking-badge rec">🎫 Empf.</span>`;
      rows+=`<div class="booking-row"><div class="booking-dot" style="background:${dayColor(l.day)}"></div><span class="booking-name">${l.name}</span><span style="font-size:.6rem;color:var(--t3)">T${l.day}</span>${badge}${link}</div>`;
    });
    bookingSection+=`<div class="ov-section-title">🎫 Online-Tickets verfügbar</div><div class="booking-table">${rows}</div>`;
  }

  // Crowd summary
  const highCrowd=locations.filter(l=>l.crowd==='high');
  let crowdSection='';
  if(highCrowd.length){
    let rows='';
    highCrowd.forEach(l=>rows+=`<div class="booking-row"><div class="booking-dot" style="background:${dayColor(l.day)}"></div><span class="booking-name">${l.name}</span><span style="font-size:.6rem;color:var(--t3)">T${l.day}</span><span class="booking-badge must">🔴 Voll</span></div>`);
    crowdSection=`<div class="ov-section-title">⚠️ Stark besucht – Früh hingehen!</div><div class="booking-table">${rows}</div>`;
  }

  const dayList=DAYS.map(day=>{
    const locs=locations.filter(l=>l.day===day.id);
    const rows=locs.map(l=>{
      const crowdBadge=l.crowd?`<span class="ov-crowd ${l.crowd}">${crowdIcon[l.crowd]}</span>`:'';
      const ticketBadge=l.ticketStatus==='soldout'?`<span class="ov-book" style="background:#c0392b;color:#fff;animation:pulseRed 2.4s infinite">❌</span>`:l.ticketStatus==='limited'?`<span class="ov-book" style="background:#fff3e0;color:#c07020">⚠</span>`:l.ticketStatus==='available'?`<span class="ov-book" style="background:#e6f4ec;color:#1e7a46">✓</span>`:'';
      const price=l.price&&l.price!=='–'&&l.price!=='Kostenlos'&&l.price!=='Eintritt frei'?`<span class="ov-price">${l.price}</span>`:'';
      return `<div class="ov-loc" onclick="focusLoc(${l.id})"><div class="ov-dot" style="background:${(l.type==='Flughafen'||l.type==='Hotel')?'#888':day.color}"></div><span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;${(l.type==='Flughafen'||l.type==='Hotel')?'font-style:italic;color:var(--t3)':''}">${l.type==='Hotel'?'🏨 ':''}${l.type==='Flughafen'?'✈ ':''}${l.name}</span>${crowdBadge}${ticketBadge}${price}<a href="${gmapsNav(l.lat,l.lng)}" target="_blank" onclick="event.stopPropagation()" style="flex-shrink:0;margin-left:3px;font-size:.75rem;text-decoration:none;opacity:.6">🧭</a></div>`;
    }).join('');
    return `<div class="ov-day"><div class="ov-day-lbl" style="color:${day.color}">${day.label} – ${day.date}</div>${rows}</div><div class="ov-sep"></div>`;
  }).join('');

  return `<div class="stats-grid"><div class="stat-box"><div class="stat-n">${total}</div><div class="stat-l">Stopps</div></div><div class="stat-box"><div class="stat-n">5</div><div class="stat-l">Tage</div></div><div class="stat-box"><div class="stat-n">${fmtDist(totalWalk)}</div><div class="stat-l">Fußweg</div></div></div><div class="ov-sep"></div>${bookingSection}${crowdSection}<div class="ov-section-title" style="margin-top:4px">💡 🟢 Ruhig · 🟡 Mäßig · 🔴 Voll · ✓ Ticket frei · ⚠ Knapp · ❌ Ausgebucht</div><div class="ov-sep"></div>${dayList}`;
}

/* ═══════════════════════════════════════
   BUILD ADD FORM
═══════════════════════════════════════ */
function buildAddHTML(prefix=''){
  return `<div class="add-wrap">
    <h3>➕ Neuen Ort hinzufügen</h3>
    <div class="fg"><label>Name *</label><input type="text" id="add-name${prefix}" placeholder="z.B. Széchenyi Therme"></div>
    <div class="fg2">
      <div class="fg"><label>Kategorie</label><select id="add-type${prefix}"><option>Sehenswürdigkeit</option><option>Restaurant</option><option>Museum</option><option>Therme / Bad</option><option>Nachtleben</option><option>Einkaufen</option><option>Aussichtspunkt</option><option>Kirche</option><option>Denkmal</option><option>Hotel</option><option>Sonstiges</option></select></div>
      <div class="fg"><label>Tag</label><select id="add-day${prefix}"><option value="1">Tag 1</option><option value="2">Tag 2</option><option value="3">Tag 3</option><option value="4">Tag 4</option><option value="5">Tag 5</option></select></div>
    </div>
    <div class="fg2">
      <div class="fg"><label>Preis</label><input type="text" id="add-price${prefix}" placeholder="~€12"></div>
      <div class="fg"><label>Uhrzeit</label><input type="text" id="add-time${prefix}" placeholder="10:00"></div>
    </div>
    <div class="fg2">
      <div class="fg"><label>Dauer</label><input type="text" id="add-dur${prefix}" placeholder="~2h"></div>
      <div class="fg"><label>Bewertung</label><input type="number" id="add-rat${prefix}" min="1" max="5" step=".1" placeholder="4.5"></div>
    </div>
    <div class="fg"><label>Öffnungszeiten</label><input type="text" id="add-hours${prefix}" placeholder="Mo–Fr 9–18h"></div>
    <div class="fg2">
      <div class="fg"><label>Andrang</label><select id="add-crowd${prefix}"><option value="">–</option><option value="low">🟢 Ruhig</option><option value="med">🟡 Mäßig</option><option value="high">🔴 Voll</option></select></div>
      <div class="fg"><label>Buchung</label><select id="add-book${prefix}"><option value="none">Keine</option><option value="recommended">Empfohlen</option><option value="must">Pflicht</option></select></div>
    </div>
    <div class="fg2">
      <div class="fg"><label>Ticket-Status</label><select id="add-tstat${prefix}"><option value="">–</option><option value="available">✓ Verfügbar</option><option value="limited">⚠ Knapp</option><option value="soldout">❌ Ausgebucht</option></select></div>
      <div class="fg"><label>Ticket-Link</label><input type="text" id="add-turl${prefix}" placeholder="https://..."></div>
    </div>
    <div class="fg2">
      <div class="fg"><label>Breite (Lat)</label><input type="number" id="add-lat${prefix}" step=".0001" placeholder="47.5000"></div>
      <div class="fg"><label>Länge (Lng)</label><input type="number" id="add-lng${prefix}" step=".0001" placeholder="19.0500"></div>
    </div>
    <div class="fg"><label>Bus / ÖPNV</label><input type="text" id="add-bus${prefix}" placeholder="🚌 Bus 16 · ~15 Min"></div>
    <div class="fg"><label>Notizen</label><textarea id="add-notes${prefix}" placeholder="Tipps..."></textarea></div>
    <div class="tip-box">💡 Auf Karte tippen → Koordinaten automatisch!</div>
    <div class="btn-row">
      <button class="btn btn-g" onclick="clearAdd('${prefix}')">Leeren</button>
      <button class="btn btn-r" onclick="addLoc('${prefix}')">✚ Hinzufügen</button>
    </div>
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
      <div style="font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:6px">Alle Orte</div>
      <div id="ml${prefix}">${buildManageHTML()}</div>
    </div>
  </div>`;
}

function buildManageHTML(){
  return locations.map(l=>`<div class="manage-item"><div class="manage-dot" style="background:${dayColor(l.day)}"></div><span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:.75rem" title="${l.name}">${l.name}</span><span style="font-size:.62rem;color:var(--t3);flex-shrink:0">T${l.day}</span><button class="ic del" onclick="deleteLoc(${l.id})" style="opacity:1">✕</button></div>`).join('')||'<div style="font-size:.75rem;color:var(--t3);font-style:italic;padding:4px 0">Keine Orte.</div>';
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function renderSidebar(){
  const plan=buildPlanHTML(),ov=buildOvHTML();
  document.getElementById('dp-plan').innerHTML=plan;
  document.getElementById('dp-ov').innerHTML=ov;
  document.getElementById('dp-add').innerHTML=buildAddHTML();
  document.getElementById('dplan').innerHTML=plan;
  document.getElementById('dov').innerHTML=ov;
  document.getElementById('dadd').innerHTML=buildAddHTML('-m');
}
function renderAll(){renderSidebar();renderMap()}

/* ═══════════════════════════════════════
   INTERACTIONS
═══════════════════════════════════════ */
function toggleDay(id){document.querySelectorAll(`[id="db-${id}"]`).forEach(el=>el.classList.toggle('closed'))}

function focusLoc(id){
  const loc=locations.find(l=>l.id===id);
  if(!loc) return;
  if(map){
    map.setView([loc.lat,loc.lng],16,{animate:true});
    if(loc._marker) setTimeout(()=>loc._marker.openPopup(),300);
  }
  highlightCard(id);
  if(window.innerWidth<=700) setTimeout(()=>{
    document.getElementById('drawer').classList.remove('open');
    document.querySelectorAll('.mn-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('mn-map').classList.add('active');
  },150);
}

function highlightCard(id){
  document.querySelectorAll('.loc-card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll(`#card-${id}`).forEach(c=>{c.classList.add('active');c.scrollIntoView({behavior:'smooth',block:'nearest'})});
}

function deleteLoc(id){
  if(!confirm('Ort wirklich löschen?')) return;
  locations=locations.filter(l=>l.id!==id);renderAll();showToast('Ort gelöscht');
}

function addLoc(prefix=''){
  const p=prefix;
  const name=document.getElementById('add-name'+p)?.value.trim();
  const lat=parseFloat(document.getElementById('add-lat'+p)?.value);
  const lng=parseFloat(document.getElementById('add-lng'+p)?.value);
  if(!name){showToast('⚠ Name erforderlich');return}
  if(isNaN(lat)||isNaN(lng)){showToast('⚠ Koordinaten fehlen!');return}
  const loc={
    id:nextId++,day:parseInt(document.getElementById('add-day'+p).value),
    name,type:document.getElementById('add-type'+p).value,lat,lng,
    price:document.getElementById('add-price'+p)?.value.trim()||null,
    time:document.getElementById('add-time'+p)?.value.trim()||null,
    duration:document.getElementById('add-dur'+p)?.value.trim()||null,
    rating:parseFloat(document.getElementById('add-rat'+p)?.value)||null,
    hours:document.getElementById('add-hours'+p)?.value.trim()||null,
    busInfo:document.getElementById('add-bus'+p)?.value.trim()||null,
    notes:document.getElementById('add-notes'+p)?.value.trim()||null,
    crowd:document.getElementById('add-crowd'+p)?.value||null,
    booking:document.getElementById('add-book'+p)?.value||'none',
    ticketStatus:document.getElementById('add-tstat'+p)?.value||null,
    ticketUrl:document.getElementById('add-turl'+p)?.value.trim()||null,
  };
  locations.push(loc);clearAdd(p);renderAll();
  setTimeout(()=>focusLoc(loc.id),300);
  showToast(`✅ "${loc.name}" hinzugefügt`);
}

function clearAdd(prefix=''){
  ['add-name','add-price','add-time','add-dur','add-lat','add-lng','add-notes','add-rat','add-bus','add-hours','add-turl']
    .forEach(id=>{const el=document.getElementById(id+prefix);if(el)el.value=''});
  const crowd=document.getElementById('add-crowd'+prefix);if(crowd)crowd.value='';
  const book=document.getElementById('add-book'+prefix);if(book)book.value='none';
  const tstat=document.getElementById('add-tstat'+prefix);if(tstat)tstat.value='';
}

/* ═══════════════════════════════════════
   TABS & NAV
═══════════════════════════════════════ */
function deskTab(name,btn){
  document.querySelectorAll('#desk-tabbar .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#desk-panel .pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('dp-'+name).classList.add('active');
}
function drawerTab(id,btn){
  document.querySelectorAll('.dtab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.dpane').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function mobNav(target,btn){
  document.querySelectorAll('.mn-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const drawer=document.getElementById('drawer');
  if(target==='map'){drawer.classList.remove('open');return}
  drawer.classList.add('open');
  const tabMap={plan:'dplan',ov:'dov',add:'dadd'};
  document.querySelectorAll('.dtab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.dpane').forEach(p=>p.classList.remove('active'));
  const idx={plan:0,ov:1,add:2}[target]??0;
  const tabBtns=document.querySelectorAll('.dtab-btn');
  if(tabBtns[idx]) tabBtns[idx].classList.add('active');
  document.getElementById(tabMap[target]).classList.add('active');
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open')}

/* Swipe to close drawer */
let touchStartY=0;
document.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!document.getElementById('drawer').classList.contains('open')) return;
  if(e.touches[0].clientY-touchStartY>60) closeDrawer();
},{passive:true});

/* ═══════════════════════════════════════
   SAVE / LOAD
═══════════════════════════════════════ */
function exportJSON(){
  const blob=new Blob([JSON.stringify({locations,nextId},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='budapest-2026.json';a.click();
  showToast('💾 Gespeichert!');
}
function openModal(){document.getElementById('modal-bg').classList.add('open')}
function closeModal(){document.getElementById('modal-bg').classList.remove('open')}
function importJSON(){
  try{
    const d=JSON.parse(document.getElementById('import-json').value);
    if(!d.locations) throw 0;
    locations=d.locations;if(d.nextId)nextId=d.nextId;
    renderAll();closeModal();showToast('✅ Importiert!');
  }catch{showToast('❌ Ungültiges Format')}
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded',()=>{renderSidebar();initMap()});
</script>
